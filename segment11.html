<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Cosmic Melody — Shared Hearts</title>
    <style>
        /* ==========================================
           1. GLOBAL STRUCTURE & CORE RESET
           ========================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #0c0914;
            background-image: radial-gradient(circle at 50% 50%, #171126 0%, #05030a 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            color: #ffffff;
            position: relative;
            transition: background 1.5s ease;
            padding: 25px 15px 105px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ==========================================
           2. AMBIENT LIGHTING & DECORATIVE ENGINES
           ========================================== */
        /* Dynamic fluid glowing orb that maps to music colors */
        .ambient-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: rgba(255, 117, 140, 0.15);
            filter: blur(100px);
            z-index: 0;
            pointer-events: none;
            transition: background 1.5s ease, transform 0.4s ease;
        }

        /* Dense Starlit Overlay Base Wrapper */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.85;
        }

        /* Highly stylized organic blinking stars */
        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            animation: romanticBlink 3.5s infinite ease-in-out;
            box-shadow: 0 0 4px #ffffff;
        }

        @keyframes romanticBlink {
            0%, 100% { opacity: 0.15; transform: scale(0.7); filter: drop-shadow(0 0 0px #fff); }
            50% { opacity: 1; transform: scale(1.3); filter: drop-shadow(0 0 4px #fff); }
        }

        /* ==========================================
           3. ROMANTIC TYPOGRAPHY & HEADER LAYOUT
           ========================================== */
        header {
            text-align: center;
            margin-bottom: 22px;
            z-index: 10;
            width: 100%;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #ff758c, #ffaa00, #ff7eb3, #b57edc);
            background-size: 300% 300%;
            animation: gradientShift 6s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        header p {
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.65);
            font-style: italic;
            letter-spacing: 0.3px;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ==========================================
           4. CENTER TRANSITION LYRICS DISPLAY STAGE
           ========================================== */
        .lyrics-stage {
            width: 100%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 20px;
            padding: 22px 16px;
            margin-bottom: 25px;
            min-height: 145px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .lyrics-display {
            font-size: 0.98rem;
            font-weight: 500;
            line-height: 1.65;
            color: #f8fafc;
            min-height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
            text-shadow: 0 2px 10px rgba(0,0,0,0.7);
            transition: color 0.4s ease;
        }

        /* Audio beat spectrum graphics alignment */
        .visualizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 4px;
            height: 24px;
            margin-top: 18px;
            opacity: 0.15;
            transition: opacity 0.4s ease;
        }

        .visualizer.active {
            opacity: 1;
        }

        .bar {
            width: 3px;
            height: 4px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 2px;
            transition: height 0.1s ease, background-color 0.4s ease;
        }

        /* ==========================================
           5. 2x3 BALANCED RESPONSIVE GRID CONFIG
           ========================================== */
        .jukebox-grid {
            width: 100%;
            max-width: 370px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            z-index: 10;
        }

        .song-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 9px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2), border-color 0.4s ease, background-color 0.4s ease;
            position: relative;
        }

        .song-card:active {
            transform: scale(0.95);
        }

        .poster-frame {
            width: 100%;
            aspect-ratio: 3/4;
            border-radius: 11px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 6px 18px rgba(0,0,0,0.55);
            background: #151122;
        }

        .poster-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .song-card.playing .poster-img {
            transform: scale(1.08);
        }

        /* Glowing interactive border overlay when active */
        .song-card.playing::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 2px solid var(--accent-color, #ff758c);
            border-radius: 16px;
            pointer-events: none;
            z-index: 5;
            animation: pulseBorder 1.5s infinite alternate;
        }

        @keyframes pulseBorder {
            0% { opacity: 0.4; box-shadow: inset 0 0 6px var(--accent-color); }
            100% { opacity: 1; box-shadow: inset 0 0 16px var(--accent-color), 0 0 12px var(--accent-color); }
        }

        /* Decorative frame layout for dynamic labels */
        .song-info-frame {
            margin-top: 10px;
            width: 100%;
            text-align: center;
            padding: 6px 4px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.08);
            transition: all 0.4s ease;
        }

        .song-card.playing .song-info-frame {
            background: rgba(255, 255, 255, 0.07);
            border-style: solid;
            border-color: var(--accent-color, #ff758c);
        }

        .song-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: #f1f5f9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.48);
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Spinning Compact Vinyl Disk Badge Badge */
        .disc-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 26px;
            height: 26px;
            background: radial-gradient(circle, #333 30%, #050505 70%);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 50%;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .disc-center {
            width: 7px;
            height: 7px;
            background: #ffffff;
            border-radius: 50%;
        }

        .song-card.playing .disc-overlay {
            opacity: 1;
            transform: scale(1);
            animation: spinDisc 3.5s linear infinite;
        }

        @keyframes spinDisc {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ==========================================
           6. SAFE PERSISTENT OVERLAY FOOTER BUTTON
           ========================================== */
        .footer-navigation {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, rgba(5, 3, 10, 1) 75%, rgba(5, 3, 10, 0));
            padding: 15px 20px 28px 20px;
            display: flex;
            justify-content: center;
            z-index: 100;
            pointer-events: none;
        }

        .next-seg-btn {
            pointer-events: auto;
            width: 100%;
            max-width: 340px;
            background: linear-gradient(45deg, #ff758c 0%, #ff7eb3 100%);
            border: none;
            border-radius: 25px;
            color: #ffffff;
            font-size: 0.92rem;
            font-weight: 600;
            padding: 14px 20px;
            cursor: pointer;
            box-shadow: 0 5px 18px rgba(255, 117, 140, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: all 0.4s ease;
        }

        .next-seg-btn:active {
            transform: scale(0.96);
        }

        .placeholder-art {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.12);
            font-size: 2.2rem;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="starfield" id="starfield"></div>
    <div class="ambient-glow" id="ambientGlow"></div>

    <header>
        <h1>Our Cosmic Playlist ❤️</h1>
        <p>Every track holds a piece of my heart for you</p>
    </header>

    <div class="lyrics-stage" id="lyricsStage">
        <div class="lyrics-display" id="lyricsDisplay">Touch a melody to whisper its words...</div>
        <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>

    <div class="jukebox-grid" id="jukeboxGrid">
        
        <div class="song-card" onclick="playSong(0)" id="card-0" style="--accent-color: #39ff14;">
            <div class="poster-frame">
                <div class="placeholder-art">🎵</div>
                <img src="poster1.jpg" alt="Tumi" class="poster-img" onerror="this.style.opacity='0'">
                <div class="disc-overlay"><div class="disc-center"></div></div>
            </div>
            <div class="song-info-frame">
                <div class="song-title">1. Tumi</div>
                <div class="song-artist">Level Five</div>
            </div>
        </div>

        <div class="song-card" onclick="playSong(1)" id="card-1" style="--accent-color: #00e5ff;">
            <div class="poster-frame">
                <div class="placeholder-art">🎵</div>
                <img src="poster2.jpg" alt="Here With Me" class="poster-img" onerror="this.style.opacity='0'">
                <div class="disc-overlay"><div class="disc-center"></div></div>
            </div>
            <div class="song-info-frame">
                <div class="song-title">2. Here With Me</div>
                <div class="song-artist">d4vd</div>
            </div>
        </div>

        <div class="song-card" onclick="playSong(2)" id="card-2" style="--accent-color: #ffaa00;">
            <div class="poster-frame">
                <div class="placeholder-art">🎵</div>
                <img src="poster3.jpg" alt="Tum Se Hi" class="poster-img" onerror="this.style.opacity='0'">
                <div class="disc-overlay"><div class="disc-center"></div></div>
            </div>
            <div class="song-info-frame">
                <div class="song-title">3. Tum Se Hi</div>
                <div class="song-artist">Mohit Chauhan</div>
            </div>
        </div>

        <div class="song-card" onclick="playSong(3)" id="card-3" style="--accent-color: #ff007f;">
            <div class="poster-frame">
                <div class="placeholder-art">🎵</div>
                <img src="poster4.jpg" alt="Starboy" class="poster-img" onerror="this.style.opacity='0'">
                <div class="disc-overlay"><div class="disc-center"></div></div>
            </div>
            <div class="song-info-frame">
                <div class="song-title">4. Starboy</div>
                <div class="song-artist">The Weeknd</div>
            </div>
        </div>

        <div class="song-card" onclick="playSong(4)" id="card-4" style="--accent-color: #b57edc;">
            <div class="poster-frame">
                <div class="placeholder-art">🎵</div>
                <img src="poster5.jpg" alt="Wanna Be Yours" class="poster-img" onerror="this.style.opacity='0'">
                <div class="disc-overlay"><div class="disc-center"></div></div>
            </div>
            <div class="song-info-frame">
                <div class="song-title">5. Wanna Be Yours</div>
                <div class="song-artist">Arctic Monkeys</div>
            </div>
        </div>

        <div class="song-card" onclick="playSong(5)" id="card-5" style="--accent-color: #ff4d4d;">
            <div class="poster-frame">
                <div class="placeholder-art">🎵</div>
                <img src="poster6.jpg" alt="Perfect" class="poster-img" onerror="this.style.opacity='0'">
                <div class="disc-overlay"><div class="disc-center"></div></div>
            </div>
            <div class="song-info-frame">
                <div class="song-title">6. Perfect</div>
                <div class="song-artist">Ed Sheeran</div>
            </div>
        </div>
    </div>

    <div class="footer-navigation">
        <a href="segment12.html" class="next-seg-btn" id="nextButton">
            <span>Continue Our Journey ❤️</span>
        </a>
    </div>

    <audio id="globalAudioPlayer" loop></audio>

    <script>
        /* ==========================================
           7. TRACK DETAILS & INTERACTIVE DATA BANK
           ========================================== */
        const songsDatabase = [
            {
                title: "Tumi",
                file: "song1.mp3",
                bgPalette: "radial-gradient(circle at 50% 50%, #082911 0%, #030a05 100%)",
                glowColor: "rgba(57, 255, 20, 0.25)",
                lyrics: [
                    "Tumi level five er cheyeo mishti...",
                    "Amar puro akash jure tomar opurbo srishti.",
                    "Synthesizer er sure shudhu tomar kotha mone pore...",
                    "Tumi acho amar hridoyer thik govir ontore."
                ]
            },
            {
                title: "Here With Me",
                file: "song2.mp3",
                bgPalette: "radial-gradient(circle at 50% 50%, #0b283f 0%, #030b12 100%)",
                glowColor: "rgba(0, 229, 255, 0.25)",
                lyrics: [
                    "I don't care how long it takes...",
                    "As long as I'm with you, my heart never breaks.",
                    "The stars in the sky shine a little less bright...",
                    "When you are right here holding me tight."
                ]
            },
            {
                title: "Tum Se Hi",
                file: "song3.mp3",
                bgPalette: "radial-gradient(circle at 50% 50%, #3e2406 0%, #120b02 100%)",
                glowColor: "rgba(255, 170, 0, 0.25)",
                lyrics: [
                    "Tum se hi din hota hai...",
                    "Surmaiye shaam aati hai tum se hi.",
                    "Har lamha mera har saans meri...",
                    "Tum se hi judi hai ab zindagi meri."
                ]
            },
            {
                title: "Starboy",
                file: "song4.mp3",
                bgPalette: "radial-gradient(circle at 50% 50%, #400624 0%, #12010a 100%)",
                glowColor: "rgba(255, 0, 127, 0.25)",
                lyrics: [
                    "Look what you've done...",
                    "I'm a starboy walking matching your stride.",
                    "No gravity can pull us down tonight...",
                    "We belong together in this cosmic light."
                ]
            },
            {
                title: "Wanna Be Yours",
                file: "song5.mp3",
                bgPalette: "radial-gradient(circle at 50% 50%, #25133d 0%, #0b0414 100%)",
                glowColor: "rgba(181, 126, 220, 0.25)",
                lyrics: [
                    "I wanna be your vacuum cleaner...",
                    "Breathing in your dust and holding you closer.",
                    "I just wanna be yours...",
                    "Secrets and promises locked inside doors."
                ]
            },
            {
                title: "Perfect",
                file: "song6.mp3",
                bgPalette: "radial-gradient(circle at 50% 50%, #3a0a0a 0%, #140202 100%)",
                glowColor: "rgba(255, 77, 77, 0.25)",
                lyrics: [
                    "I found a love, for me...",
                    "Darling, just dive right in and follow my lead.",
                    "I see my future inside your eyes tonight...",
                    "You look absolutely perfect in this starlight."
                ]
            }
        ];

        let currentTrackIndex = null;
        let typewriterInterval = null;
        let lyricLineIndex = 0;
        let beatAnimationId = null;

        // Core Document Elements Hooks
        const audioPlayer = document.getElementById('globalAudioPlayer');
        const lyricsDisplay = document.getElementById('lyricsDisplay');
        const visualizer = document.getElementById('visualizer');
        const ambientGlow = document.getElementById('ambientGlow');
        const visualizerBars = document.querySelectorAll('.bar');

        /* ==========================================
           8. DENSE STARFIELD GENERATION ENGINE (125+ Stars)
           ========================================== */
        function createStars() {
            const starfield = document.getElementById('starfield');
            const numStars = 125; // Drastically elevated star payload density
            
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // Varied spatial bounds mapping
                const size = (Math.random() * 2.2 + 0.8);
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                
                // Desynchronized runtime offsets for organic breathing sky layout
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (Math.random() * 3.5 + 2) + 's';
                
                starfield.appendChild(star);
            }
        }
        createStars();

        /* ==========================================
           9. TYPEWRITER LYRICS SEQUENCER AUTOMATION
           ========================================== */
        function startTypewriterEngine(lyricsArray) {
            clearInterval(typewriterInterval);
            lyricLineIndex = 0;
            
            function typeLine() {
                const fullText = lyricsArray[lyricLineIndex];
                let charIndex = 0;
                lyricsDisplay.innerHTML = "";
                lyricsDisplay.style.color = document.getElementById(`card-${currentTrackIndex}`).style.getPropertyValue('--accent-color');
                
                function typeChar() {
                    if (charIndex < fullText.length) {
                        lyricsDisplay.innerHTML += fullText.charAt(charIndex);
                        charIndex++;
                        typewriterInterval = setTimeout(typeChar, 70); // Crisp fluent rhythm tracking
                    } else {
                        // Safe state hold time before processing next line index
                        typewriterInterval = setTimeout(() => {
                            lyricLineIndex = (lyricLineIndex + 1) % lyricsArray.length;
                            typeLine();
                        }, 2600);
                    }
                }
                typeChar();
            }
            typeLine();
        }

        /* ==========================================
           10. AUDIO INTERACTIVE PULSE AMBIENT MODULATOR
           ========================================== */
        function simulateMusicBeat() {
            if (currentTrackIndex === null) return;
            
            visualizerBars.forEach(bar => {
                const heightValue = Math.floor(Math.random() * 22) + 4;
                bar.style.height = heightValue + 'px';
                bar.style.backgroundColor = document.getElementById(`card-${currentTrackIndex}`).style.getPropertyValue('--accent-color');
            });

            // Smooth scaling pulse mechanics
            const scaleFactor = 1 + (Math.random() * 0.09);
            ambientGlow.style.transform = `translate(-50%, -50%) scale(${scaleFactor})`;

            beatAnimationId = setTimeout(simulateMusicBeat, 100);
        }

        /* ==========================================
           11. CENTRAL PLAYBACK COMMAND CONTROLLER
           ========================================== */
        function playSong(index) {
            // Toggle mechanics if current playing card is clicked
            if (currentTrackIndex === index) {
                if (audioPlayer.paused) {
                    audioPlayer.play();
                    visualizer.classList.add('active');
                    simulateMusicBeat();
                } else {
                    audioPlayer.pause();
                    visualizer.classList.remove('active');
                    clearTimeout(beatAnimationId);
                }
                return;
            }

            // Clear any previously applied visual state layers
            document.querySelectorAll('.song-card').forEach(card => card.classList.remove('playing'));
            
            currentTrackIndex = index;
            const song = songsDatabase[index];
            const currentCard = document.getElementById(`card-${index}`);
            currentCard.classList.add('playing');

            // Map and shift viewport global color vectors
            document.body.style.background = song.bgPalette;
            ambientGlow.style.background = song.glowColor;

            const accentColor = currentCard.style.getPropertyValue('--accent-color');
            document.getElementById('nextButton').style.background = `linear-gradient(45deg, ${accentColor} -20%, #100a1c 130%)`;
            document.getElementById('nextButton').style.boxShadow = `0 6px 22px ${song.glowColor}`;

            // Standalone audio injection routing
            audioPlayer.src = song.file;
            audioPlayer.play()
                .then(() => {
                    visualizer.classList.add('active');
                    clearTimeout(beatAnimationId);
                    simulateMusicBeat();
                })
                .catch(() => {
                    // Fallback configuration handler for security bounds bypass
                    visualizer.classList.add('active');
                    clearTimeout(beatAnimationId);
                    simulateMusicBeat();
                });

            startTypewriterEngine(song.lyrics);
        }
    </script>
</body>
</html>
