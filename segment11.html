<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #05030a 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        
        /* Starry Aurora Background */
        #star-layer { position: fixed; top:0; left:0; width:100%; height:100%; z-index:0; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.6; animation: twinkle infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* Jukebox Container */
        .jukebox-container { 
            z-index: 1; width: 100%; max-width: 400px; 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 50px;
        }

        .song-card { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; padding: 10px;
            transition: all 0.4s ease; cursor: pointer;
        }
        .song-card:hover { border-color: #ff758c; transform: translateY(-5px); }
        .poster-frame { 
            width: 100%; aspect-ratio: 1/1; border-radius: 15px; 
            overflow: hidden; border: 2px solid #333;
        }
        .poster-img { width: 100%; height: 100%; object-fit: cover; }

        .btn-next { 
            position: fixed; bottom: 30px; padding: 15px 40px;
            background: linear-gradient(90deg, #ff758c, #8e44ad);
            border: none; border-radius: 30px; color: white; font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="star-layer"></div>
    
    <div class="jukebox-container">
        <div class="song-card" onclick="playTrack(1)">
            <div class="poster-frame"><img src="poster1.jpg" class="poster-img"></div>
        </div>
        </div>

    <button class="btn-next">Continue Our Journey ❤️</button>

    <script>
        // 700 Stars Engine
        const starLayer = document.getElementById('star-layer');
        for(let i=0; i<700; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random()*2 + 'px';
            star.style.left = Math.random()*100 + '%';
            star.style.top = Math.random()*100 + '%';
            star.style.animationDuration = (Math.random()*3 + 1) + 's';
            starLayer.appendChild(star);
        }

        function playTrack(id) {
            // Beat Logic & Aurora Shift
            document.body.style.transition = "background 2s ease";
            document.body.style.background = "radial-gradient(circle at 50% 50%, #2c003e 0%, #000 100%)";
            // Trigger audio logic here
        }
    </script>
</body>
</html>
