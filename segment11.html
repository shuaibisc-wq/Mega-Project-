<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Cosmic Playlist ❤️</title>
    <style>
        /* CSS Core Architecture: Samsung A06 Viewport Specially Calibrated */
        :root {
            --primary-glow: #ff758c;
            --accent-gold: #ffd700;
            --bg-glow: radial-gradient(circle at center, #1f0d3d 0%, #050508 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: var(--bg-glow);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 24px 16px;
            transition: background 1s ease;
        }

        /* 700+ Blinking Celestial Particles Layer */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Responsive Layout Containers avoiding top/bottom phone safe-zones */
        .header-zone {
            z-index: 5;
            text-align: center;
            width: 100%;
            margin-top: 8px;
        }

        .header-zone h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff0f5;
            text-shadow: 0 0 12px var(--primary-glow), 0 0 25px rgba(255, 117, 140, 0.4);
            letter-spacing: 0.5px;
        }

        .header-zone p {
            font-size: 0.8rem;
            color: #ffccd5;
            opacity: 0.85;
            margin-top: 4px;
            font-style: italic;
        }

        /* Center Empty Stage Grid for Visualizer */
        .stage-zone {
            z-index: 5;
            width: 100%;
            max-width: 360px;
            height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.02);
        }

        .soundwave {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 35px;
        }

        .wave-bar {
            width: 4px;
            height: 4px;
            background: linear-gradient(to top, var(--primary-glow), #ffffff);
            border-radius: 2px;
            transition: height 0.1s ease;
        }

        /* Premium 2x3 Grid Layout without any overlapping spacing faults */
        .jukebox-matrix {
            z-index: 5;
            width: 100%;
            max-width: 360px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            justify-content: center;
            align-content: center;
        }

        .poster-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1.5px solid rgba(255, 215, 0, 0.25); /* Luxury Soft Gold Border */
            border-radius: 14px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .image-frame {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            border-radius: 10px;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: transform 0.5s ease, border-radius 0.5s ease;
        }

        .image-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .track-metadata {
            font-size: 0.72rem;
            font-weight: 500;
            color: #e0e0e0;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            padding: 0 2px;
            transition: color 0.3s;
        }

        /* Melt-down Interactive Classes */
        .poster-card.active-track {
            border-color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.35);
            transform: scale(1.03);
        }

        .poster-card.active-track .image-frame {
            border-radius: 50%;
            animation: spinVinyl 4s linear infinite;
            border: 2px solid var(--accent-gold);
        }

        .poster-card.active-track .track-metadata {
            color: var(--accent-gold);
            font-weight: 600;
        }

        @keyframes spinVinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Fixed Bottom Safe Navigation Layer */
        .navigation-zone {
            z-index: 5;
            width: 100%;
            max-width: 360px;
            margin-bottom: 4px;
        }

        .romantic-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            border: none;
            outline: none;
            padding: 14px;
            border-radius: 25px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.4);
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .romantic-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(255, 117, 140, 0.6);
            background: linear-gradient(135deg, #ff5e7e 0%, #ff6b9d 100%);
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div class="header-zone">
        <h1>Our Cosmic Playlist ❤️</h1>
        <p>Every track holds a piece of my heart</p>
    </div>

    <div class="stage-zone">
        <div class="soundwave" id="waveContainer">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>
    </div>

    <div class="jukebox-matrix">
        <div class="poster-card" onclick="triggerCosmicEngine(0, this)">
            <div class="image-frame"><img src="poster1.jpg" alt="Poster 1"></div>
            <div class="track-metadata">Tumi Level Five</div>
        </div>
        <div class="poster-card" onclick="triggerCosmicEngine(1, this)">
            <div class="image-frame"><img src="poster2.jpg" alt="Poster 2"></div>
            <div class="track-metadata">Here With Me</div>
        </div>
        <div class="poster-card" onclick="triggerCosmicEngine(2, this)">
            <div class="image-frame"><img src="poster3.jpg" alt="Poster 3"></div>
            <div class="track-metadata">Tum Se Hi</div>
        </div>
        <div class="poster-card" onclick="triggerCosmicEngine(3, this)">
            <div class="image-frame"><img src="poster4.jpg" alt="Poster 4"></div>
            <div class="track-metadata">Starboy</div>
        </div>
        <div class="poster-card" onclick="triggerCosmicEngine(4, this)">
            <div class="image-frame"><img src="poster5.jpg" alt="Poster 5"></div>
            <div class="track-metadata">I Wanna Be Yours</div>
        </div>
        <div class="poster-card" onclick="triggerCosmicEngine(5, this)">
            <div class="image-frame"><img src="poster6.jpg" alt="Poster 6"></div>
            <div class="track-metadata">Die With A Smile</div>
        </div>
    </div>

    <div class="navigation-zone">
        <button class="romantic-btn" onclick="nextSegment()">
            <span>Continue Our Journey</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        </button>
    </div>

    <script>
        // Global Audio Handler Engine
        let activeAudio = null;
        let visualizerInterval = null;

        // Dynamic Configuration Arrays mapped for instant layout color shift
        const cosmicTracks = [
            { src: 'song1.mp3', bg: 'radial-gradient(circle at center, #0b3a22 0%, #020804 100%)' }, // Neon Green Theme
            { src: 'song2.mp3', bg: 'radial-gradient(circle at center, #1b263b 0%, #050811 100%)' }, // Mystic Oceanic Blue
            { src: 'song3.mp3', bg: 'radial-gradient(circle at center, #3a1c1c 0%, #090303 100%)' }, // Romantic Crimson
            { src: 'song4.mp3', bg: 'radial-gradient(circle at center, #2e112d 0%, #080208 100%)' }, // Dark Velvet Purple
            { src: 'song5.mp3', bg: 'radial-gradient(circle at center, #2b2b11 0%, #0a0a03 100%)' }, // Soft Amber
            { src: 'song6.mp3', bg: 'radial-gradient(circle at center, #112a2b 0%, #02090a 100%)' }  // Deep Cyan
        ];

        // Canvas 700+ Blinking Starfield Engine Initialization
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 700; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 0.9 + 0.2,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005,
                    direction: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < stars.length; i++) {
                let s = stars[i];
                s.alpha += s.speed * s.direction;
                if (s.alpha >= 1) { s.alpha = 1; s.direction = -1; }
                else if (s.alpha <= 0.1) { s.alpha = 0.1; s.direction = 1; }
                
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${s.alpha})`;
                ctx.fill();
            }
            requestAnimationFrame(animateStars);
        }

        window.addEventListener('resize', initStars);
        initStars();
        animateStars();

        // High-fidelity Touch Handling Core Routing Logic
        function triggerCosmicEngine(index, element) {
            // Remove previous active track classes instantly
            document.querySelectorAll('.poster-card').forEach(card => {
                card.classList.remove('active-track');
            });

            // Stop track if already playing to avoid overlap
            if (activeAudio) {
                activeAudio.pause();
                activeAudio.currentTime = 0;
                clearInterval(visualizerInterval);
                resetVisualizerBars();
            }

            // Assign and play selected module
            element.classList.add('active-track');
            document.body.style.background = cosmicTracks[index].bg;

            activeAudio = new Audio(cosmicTracks[index].src);
            activeAudio.play().then(() => {
                startVisualizerAnimation();
            }).catch(error => console.log("Audio trigger setup system verification hold. User interaction verified."));

            // Auto-reset when track finishes running bounds
            activeAudio.onended = () => {
                element.classList.remove('active-track');
                clearInterval(visualizerInterval);
                resetVisualizerBars();
            };
        }

        // Pulse Synchronized Bar Generator Mapping
        function startVisualizerAnimation() {
            const bars = document.querySelectorAll('.wave-bar');
            visualizerInterval = setInterval(() => {
                bars.forEach(bar => {
                    let activeHeight = Math.floor(Math.random() * 32) + 6;
                    bar.style.height = `${activeHeight}px`;
                });
            }, 100);
        }

        function resetVisualizerBars() {
            document.querySelectorAll('.wave-bar').forEach(bar => {
                bar.style.height = '4px';
            });
        }

        function nextSegment() {
            if (activeAudio) {
                activeAudio.pause();
            }
            // Transition interface execution mapping
            alert("Moving beautifully into the next phase of our journey... ❤️");
        }
    </script>
</body>
</html>
