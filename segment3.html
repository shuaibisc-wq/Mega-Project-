<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Chronicle | Timeline</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel&family=Montserrat:wght@300&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: white; font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }

        #starCanvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        .timeline-container {
            position: relative; z-index: 2;
            display: flex; flex-direction: column; align-items: center;
            padding: 80px 20px;
        }

        .timeline-line {
            position: absolute; left: 50%; top: 100px; bottom: 100px;
            width: 2px; background: linear-gradient(to bottom, transparent, #00d2ff, transparent);
            transform: translateX(-50%);
        }

        /* Moment Cards */
        .moment-card {
            width: 85%; max-width: 320px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 210, 255, 0.2);
            padding: 20px; border-radius: 15px; margin-bottom: 80px;
            opacity: 0; transform: translateY(30px); transition: 1.2s all ease;
            backdrop-filter: blur(8px); position: relative;
        }

        /* Chat Screenshot Style */
        .chat-ss {
            width: 100%; border-radius: 10px; margin-top: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.2);
        }

        .moment-card.show { opacity: 1; transform: translateY(0); }

        .date { font-family: 'Cinzel'; color: #00d2ff; font-size: 0.7rem; margin-bottom: 8px; letter-spacing: 2px; }
        .moment-title { font-family: 'Cinzel'; font-size: 1rem; margin-bottom: 10px; color: #fff; }
        .moment-desc { font-size: 0.8rem; line-height: 1.5; color: #bbb; font-style: italic; }
        
        .next-btn {
            z-index: 3; margin-top: 30px; padding: 15px 40px; 
            background: transparent; border: 1px solid #00d2ff; 
            color: #00d2ff; font-family: 'Cinzel'; cursor: pointer; 
            border-radius: 30px; letter-spacing: 2px; transition: 0.5s;
        }
        .next-btn:hover { background: #00d2ff; color: #000; box-shadow: 0 0 20px #00d2ff; }

        #bg-music { display: none; }
    </style>
</head>
<body onload="initStars(); resumeMusic();">

    <audio id="bg-music" loop>
        <source src="music2.mp3" type="audio/mpeg">
    </audio>

    <canvas id="starCanvas"></canvas>

    <div class="timeline-container">
        <div class="timeline-line"></div>

        <div class="moment-card">
            <div class="date">The First Convergence</div>
            <div class="moment-title">Amader Shuru</div>
            <p class="moment-desc">"Everything started with this simple text..."</p>
            <img src="chat1.png" class="chat-ss" alt="Chat Screenshot">
        </div>

        <div class="moment-card">
            <div class="date">Mathematical Resonance</div>
            <div class="moment-title">Late Night Chaos</div>
            <p class="moment-desc">"Tokhon bujhi nai je ei manush tai amar mathar shob equation elomelo kore dibe."</p>
            <img src="chat2.png" class="chat-ss" alt="Chat Screenshot">
        </div>

        <div class="moment-card">
            <div class="date">Infinite Loop</div>
            <div class="moment-title">The Sweetest Logic</div>
            <p class="moment-desc">"Every time I re-read this, I smile like a fool."</p>
            <img src="chat3.png" class="chat-ss" alt="Chat Screenshot">
        </div>

        <button class="next-btn" onclick="goToFinal()">
            PROVE THE THEOREM
        </button>
    </div>

    <script>
        const music = document.getElementById('bg-music');

        function resumeMusic() {
            const savedTime = localStorage.getItem('audioTime');
            if (savedTime) music.currentTime = parseFloat(savedTime);
            
            const startPlay = () => {
                music.play();
                window.removeEventListener('scroll', startPlay);
                window.removeEventListener('touchstart', startPlay);
            };
            window.addEventListener('scroll', startPlay);
            window.addEventListener('touchstart', startPlay);
            music.play().catch(() => {});
        }

        function goToFinal() {
            localStorage.setItem('audioTime', music.currentTime);
            window.location.href = 'segment4.html';
        }

        // --- STAR BACKGROUND ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.2,
                    opacity: Math.random(),
                    speed: Math.random() * 0.01 + 0.005
                });
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.opacity += s.speed;
                if (s.opacity > 1 || s.opacity < 0.1) s.speed = -s.speed;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) entry.target.classList.add('show');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.moment-card').forEach(card => observer.observe(card));
    </script>
</body>
</html>
