<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway to the Core</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background: #020108; 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-glow {
            position: absolute; width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(0,255,204,0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .container {
            text-align: center;
            background: rgba(10, 12, 25, 0.8);
            border: 1px solid rgba(0, 255, 204, 0.3);
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 255, 204, 0.1);
            max-width: 500px;
            width: 90%;
            transition: all 0.5s ease;
        }

        h2 { font-family: 'Cinzel', serif; font-size: 1.5rem; color: #00ffcc; letter-spacing: 2px; margin-bottom: 15px; }
        p { font-size: 0.95rem; color: #a4a7bf; line-height: 1.6; margin-bottom: 25px; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            background: transparent; border: 1px solid #00ffcc; color: #00ffcc;
            padding: 12px 20px; font-size: 1rem; border-radius: 6px; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:hover { background: #00ffcc; color: #020108; box-shadow: 0 0 15px rgba(0,255,204,0.5); }
        .btn-alt { border-color: #5c5e75; color: #5c5e75; }
        .btn-alt:hover { background: #5c5e75; color: #fff; box-shadow: 0 0 15px rgba(92,94,117,0.5); }

        #passwordSection { display: none; }
        
        /* Input Styling */
        input[type="password"], input[type="text"] {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #00ffcc;
            color: #fff; border-radius: 6px; margin-bottom: 15px; font-family: monospace; outline: none;
        }
        
        /* Password Eye Toggle Styling */
        .password-wrapper {
            position: relative;
            width: 100%;
        }
        .password-wrapper input {
            padding-right: 45px;
        }
        .eye-icon {
            position: absolute;
            top: 40%;
            right: 15px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #00ffcc;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .eye-icon:hover { opacity: 1; }

        .error-msg { color: #ff4d4d; font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container" id="identitySection">
        <h2>[ RESTRICTED AREA ]</h2>
        <p>This segment holds highly classified, personal memories. Before proceeding, please verify your identity.</p>
        <p>Are you Prova, or are you another viewer?</p>
        
        <div class="btn-group">
            <button class="btn" onclick="showPasswordPrompt()">I am Prova</button>
            <button class="btn btn-alt" onclick="goToOthers()">I am a Viewer</button>
        </div>
    </div>

    <div class="container" id="passwordSection">
        <h2>[ VERIFICATION ]</h2>
        <p>Only the owner of this heart knows the secret key. Enter to unlock Segment 17.</p>
        
        <div class="password-wrapper">
            <input type="password" id="secretKey" placeholder="Enter Secret Key">
            <span class="eye-icon" onclick="togglePassword()">
                <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg id="eyeClosed" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
            </span>
        </div>
        
        <div class="btn-group">
            <button class="btn" onclick="checkPassword()">Unlock Access</button>
            <button class="btn btn-alt" onclick="goBack()">Cancel</button>
        </div>
        
        <div class="error-msg" id="errorMsg">Access Denied! Incorrect Key.</div>
    </div>

    <script>
        // --- 1. PASSWORD TOGGLE LOGIC ---
        function togglePassword() {
            const passwordInput = document.getElementById('secretKey');
            const eyeOpen = document.getElementById('eyeOpen');
            const eyeClosed = document.getElementById('eyeClosed');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeOpen.style.display = 'none';
                eyeClosed.style.display = 'block';
            } else {
                passwordInput.type = 'password';
                eyeOpen.style.display = 'block';
                eyeClosed.style.display = 'none';
            }
        }

        // --- 2. NAVIGATION LOGIC ---
        function showPasswordPrompt() {
            document.getElementById('identitySection').style.display = 'none';
            document.getElementById('passwordSection').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('secretKey').value = '';
            
            // Reset eye icon to default on open
            document.getElementById('secretKey').type = 'password';
            document.getElementById('eyeOpen').style.display = 'block';
            document.getElementById('eyeClosed').style.display = 'none';
        }

        function goBack() {
            document.getElementById('passwordSection').style.display = 'none';
            document.getElementById('identitySection').style.display = 'block';
        }

        function goToOthers() {
            window.location.href = "segment18.html"; 
        }

        function checkPassword() {
            const key = document.getElementById('secretKey').value.toLowerCase().trim();
            const error = document.getElementById('errorMsg');

            // Secret Password
            if (key === "iloveshuaib") {
                error.style.display = 'none';
                window.location.href = "segment17.html"; 
            } else {
                error.style.display = 'block';
            }
        }
    </script>
</body>
</html>
