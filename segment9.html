<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segment 9 - Romantic Floral Gift</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Jasmine, Rose & Lily themed romantic color palette background */
            background: linear-gradient(135deg, #fffcf5 0%, #ffe3ec 50%, #f3e5f5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .wrapper-stage {
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 360px; /* Perfect for Samsung A06 viewport */
            padding: 20px;
            text-align: center;
        }
        .card-container {
            background: rgba(255, 255, 255, 0.75);
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 10px 30px rgba(224, 134, 166, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            width: 100%;
            transform: scale(0.95);
            animation: containerAppear 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes containerAppear {
            to { transform: scale(1); }
        }
        .flower-image-wrap {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px auto;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: floatingMotion 4s ease-in-out infinite;
            cursor: pointer;
        }
        @keyframes floatingMotion {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }
        .flower-image-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 8px 15px rgba(219, 72, 116, 0.4));
        }
        /* Fallback graphic if image path has cross-origin or storage delay */
        .image-fallback {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #fff0f5, #ffb6c1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            box-shadow: inset 0 0 20px rgba(255,192,203,0.5);
            z-index: -1;
        }
        h2 {
            color: #d81b60;
            font-size: 1.4rem;
            margin-bottom: 10px;
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }
        p {
            color: #6d4c41;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .next-btn {
            margin-top: 20px;
            padding: 10px 25px;
            background: linear-gradient(45deg, #ff4081, #ec407a);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(236, 64, 122, 0.4);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .next-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="wrapper-stage">
        <div class="card-container">
            <div class="flower-image-wrap" id="flowerGift">
                <div class="image-fallback">🌸</div>
                <img src="flower9.jpg" alt="Jasmine Bouquet Gift" onerror="this.style.display='none';">
            </div>
            <h2>For You, My Jaan...</h2>
            <p>A beautiful bouquet tailored with your favorite Jasmine, mixed with timeless Roses and elegant Lilies. Touch it to see the magic unfold!</p>
            <button class="next-btn" onclick="navigateToNext()">Next Surprise 🚀</button>
        </div>
    </div>

    <script>
        // --- SEAMLESS AUDIO CONTINUITY LOGIC ---
        const audio = new Audio();
        audio.src = 'music7.mp3'; // Continuous audio mapping trace
        audio.loop = true;

        function syncAudio() {
            const savedTime = localStorage.getItem('audio_current_time');
            if (savedTime) {
                audio.currentTime = parseFloat(savedTime);
            }
            
            // Sync play state to prevent browser permission block
            const isPlaying = localStorage.getItem('audio_playing') !== 'false';
            if (isPlaying) {
                audio.play().catch(() => {
                    // Force interaction fallback interaction injection
                    document.addEventListener('click', () => { audio.play(); }, { once: true });
                    document.addEventListener('touchstart', () => { audio.play(); }, { once: true });
                });
            }
        }

        // Track and continuous save execution interval loop
        audio.addEventListener('timeupdate', () => {
            localStorage.setItem('audio_current_time', audio.currentTime);
        });

        window.addEventListener('DOMContentLoaded', syncAudio);

        function navigateToNext() {
            localStorage.setItem('audio_current_time', audio.currentTime);
            // Dynamic routing pipeline to Segment 10
            window.location.href = 'segment10.html';
        }


        // --- ADVANCED PALETTE MICRO-PETAL CANVAS PHYSICS ENGINE ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const petals = [];
        // Theme Colors: Jasmine (Cream/White), Rose (Crimson Red/Deep Pink), Lily (Soft Pastel Pink/Blush)
        const paletteColors = [
            { r: 255, g: 254, b: 245, a: 0.9 }, // Jasmine White
            { r: 255, g: 240, b: 245, a: 0.85 }, // Soft Lily Pink
            { r: 224, g: 18, b: 79, a: 0.9 },   // Velvet Rose Red
            { r: 244, g: 143, b: 177, a: 0.85 }, // Rose Pink
            { r: 255, g: 253, b: 208, a: 0.9 }  // Soft Cream Stardust
        ];

        class Petal {
            constructor(x, y, isBurst = false) {
                this.x = x;
                this.y = y;
                this.color = paletteColors[Math.floor(Math.random() * paletteColors.length)];
                this.size = Math.random() * 8 + 6;
                
                if (isBurst) {
                    // High-velocity dynamic dispersion parameters
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 5 + 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                } else {
                    // Standard ambient floating drift parameters
                    this.vx = Math.random() * 1.5 - 0.75;
                    this.vy = Math.random() * 1 + 0.8;
                }
                
                this.rotation = Math.random() * Math.PI;
                this.rotationSpeed = Math.random() * 0.04 - 0.02;
                this.opacity = this.color.a;
                this.fade = Math.random() * 0.005 + 0.003;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                
                // Dynamic environmental gravity drop/sway variables
                this.vx += Math.sin(this.y / 30) * 0.02; 
                
                if (this.opacity > 0) {
                    this.opacity -= this.fade;
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // Draw organic dual-curve curved micro-petal structures
                ctx.beginPath();
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.opacity})`;
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size, -this.size/2, -this.size, this.size/2, 0, this.size);
                ctx.bezierCurveTo(this.size, this.size/2, this.size, -this.size/2, 0, 0);
                ctx.fill();
                
                // Add soft glowing core to petals
                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity * 0.4})`;
                ctx.arc(0, this.size/3, this.size/4, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // Ambient continuous spawning logic for organic life feel
        function spawnAmbientPetals() {
            if (petals.length < 40 && Math.random() < 0.1) {
                petals.push(new Petal(Math.random() * canvas.width, -20, false));
            }
        }

        // Tap/Touch burst engine trigger setup
        function createPetalBurst(e) {
            let clickX, clickY;
            if (e.touches) {
                clickX = e.touches[0].clientX;
                clickY = e.touches[0].clientY;
            } else {
                clickX = e.clientX;
                clickY = e.clientY;
            }

            // Spawn 60+ micro petals in a perfect radial burst matrix
            for (let i = 0; i < 65; i++) {
                petals.push(new Petal(clickX, clickY, true));
            }
        }

        // Event listeners mapping
        const flowerGiftElement = document.getElementById('flowerGift');
        flowerGiftElement.addEventListener('click', createPetalBurst);
        flowerGiftElement.addEventListener('touchstart', createPetalBurst, { passive: true });
        
        // Background layer screen tap mapping for interactive fun
        window.addEventListener('click', (e) => {
            if(e.target.tagName !== 'BUTTON' && !flowerGiftElement.contains(e.target)) {
                createPetalBurst(e);
            }
        });

        // Main high-performance render animation loop
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            spawnAmbientPetals();

            for (let i = petals.length - 1; i >= 0; i--) {
                petals[i].update();
                petals[i].draw();
                
                // Clear boundaries out or faded petals out of memory array mapping
                if (petals[i].opacity <= 0 || petals[i].y > canvas.height + 20 || petals[i].x < -20 || petals[i].x > canvas.width + 20) {
                    petals.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
