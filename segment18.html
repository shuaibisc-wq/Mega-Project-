<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cosmic Mainframe — Royal Edition</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Playfair+Display:ital,wght@1,400;1,500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #020108; color: #ffffff; font-family: 'Montserrat', sans-serif; }

        /* ================= PHASE 1: CELESTIAL BACKGROUND (CLASSIC) ================= */
        .universe-container { position: absolute; width: 100%; height: 100%; z-index: 1; transition: opacity 1.2s ease-in-out; background: radial-gradient(circle at center, #0a0e29 0%, #020108 100%); }
        
        .aurora-bg { position: absolute; width: 100%; height: 100%; opacity: 0.35; mix-blend-mode: screen; pointer-events: none; }
        .aurora-wave { position: absolute; width: 150%; height: 60%; background: linear-gradient(90deg, rgba(138,43,226,0.15), rgba(0,191,255,0.15), rgba(255,215,0,0.05)); filter: blur(90px); border-radius: 40%; animation: floatWave 20s infinite alternate ease-in-out; }
        @keyframes floatWave { 0% { transform: translate(-10%, -20%) rotate(0deg); } 100% { transform: translate(5%, 10%) rotate(10deg); } }

        /* DEEP WARM CLASSY GLOWING MOON */
        .romantic-moon { 
            position: absolute; 
            top: 12%; 
            right: 15%; 
            width: 95px; 
            height: 95px; 
            background: radial-gradient(circle at 30% 30%, #ffffff 0%, #fffdf0 60%, #fffae0 100%); 
            border-radius: 50%; 
            box-shadow: 0 0 40px #ffffff, 0 0 80px rgba(255, 253, 240, 0.4), 0 0 120px rgba(255, 215, 0, 0.15); 
            filter: drop-shadow(0 0 12px rgba(255,255,255,0.7)); 
            z-index: 2; 
        }

        #starfield { position: absolute; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.1; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.4); box-shadow: 0 0 10px #fff; } }

        .story-panel { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 600px; text-align: center; z-index: 10; cursor: pointer; }
        #typing-text { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-style: italic; line-height: 1.7; color: #f4f4f6; text-shadow: 0 4px 15px rgba(0,0,0,0.9); }
        .tap-hint { font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 5px; color: rgba(255,215,0,0.9); margin-top: 35px; opacity: 0; transition: opacity 1s ease; text-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .tap-hint.pulse { opacity: 1; animation: pulseGlow 2s infinite; }
        @keyframes pulseGlow { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; text-shadow: 0 0 20px #ffd700; } }

        /* ================= PHASE 2: SUBTLE TECH TERMINAL ================= */
        .terminal-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #030307; z-index: 100; display: none; flex-direction: column; justify-content: flex-start; align-items: center; padding: 60px 20px 160px 20px; font-family: monospace; opacity: 0; transition: opacity 0.8s ease-in-out; }
        
        .matrix-box { width: 100%; max-width: 750px; height: 100%; overflow-y: hidden; text-align: left; font-size: 0.95rem; line-height: 1.8; color: #94a3b8; letter-spacing: 0.5px; }
        
        /* Classy Monochrome & Gold Syntax Formatting */
        .keyword { color: #ffd700; font-weight: bold; } 
        .string { color: #e2e8f0; font-style: italic; } 
        .function { color: #f1f5f9; text-decoration: underline; } 
        .number { color: #fbbf24; } 
        .comment { color: #475569; font-style: italic; } 
        .operator { color: #94a3b8; } 
        .critical { color: #ffd700; font-weight: bold; text-shadow: 0 0 5px rgba(255,215,0,0.3); }

        /* Royal Luxury Dynamic Loader */
        .loader-container { width: 85%; max-width: 750px; border: 1px solid rgba(255, 215, 0, 0.2); padding: 20px; background: rgba(5, 5, 10, 0.9); backdrop-filter: blur(10px); border-radius: 6px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); position: absolute; bottom: 6%; left: 50%; transform: translateX(-50%); z-index: 110; }
        .loader-status { font-size: 0.85rem; color: #ffd700; font-weight: 600; letter-spacing: 1px; text-shadow: 0 0 5px rgba(255,215,0,0.2); }
        .progress-box { width: 100%; background: #111118; height: 10px; border-radius: 5px; overflow: hidden; border: 1px solid rgba(255,255,255,0.02); margin-top: 10px; }
        
        /* Luxury Royal Gold Progress Fill */
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #b38f00 0%, #ffd700 50%, #fff3b0 100%); box-shadow: 0 0 15px rgba(255,215,0,0.6); transition: width 0.1s linear; }

        /* ================= PHASE 3: THE ROYAL REVEAL ================= */
        .final-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #070a24 0%, #020108 100%); z-index: 200; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; opacity: 0; transition: opacity 1.5s ease-in-out; }
        
        .signature-box { opacity: 0; transform: translateY(20px); transition: all 1.8s cubic-bezier(0.25, 1, 0.5, 1); }
        .signature-box.show { opacity: 1; transform: translateY(0); }
        
        /* Restored Luxury Typography Style */
        .final-title { font-family: 'Cinzel', serif; font-size: 1.35rem; font-weight: 500; letter-spacing: 4px; color: #a4a7bf; margin-bottom: 20px; line-height: 2; }
        .final-title span { font-family: 'Cinzel', serif; font-weight: 700; color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.4); font-size: 1.7rem; letter-spacing: 5px; }
        .final-sub { font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 0.95rem; letter-spacing: 3px; color: #5c5e75; text-transform: uppercase; margin-bottom: 60px; }
        
        .the-end-title { font-family: 'Cinzel', serif; font-size: 4rem; font-weight: 700; letter-spacing: 25px; color: #ffffff; text-shadow: 0 0 30px rgba(255,255,255,0.4); opacity: 0; transform: scale(0.9); transition: all 2.5s ease; margin-left: 25px; }
        .the-end-title.show { opacity: 1; transform: scale(1); }

    </style>
</head>
<body>

    <div class="universe-container" id="universeGrid">
        <div class="aurora-bg"><div class="aurora-wave"></div></div>
        <div class="romantic-moon"></div>
        <div id="starfield"></div>
        
        <div class="story-panel" id="storyPanel" onclick="triggerSystemShift()">
            <div id="typing-text"></div>
            <div class="tap-hint" id="tapHint">─ Initiate Overdrive ─</div>
        </div>
    </div>

    <div class="terminal-screen" id="terminalScreen">
        <div class="matrix-box" id="matrixConsole"></div>
        <div class="loader-container">
            <div class="loader-status" id="loadStatus">INITIALIZING CORE ALIGNMENT OVERRIDE... 0%</div>
            <div class="progress-box"><div class="progress-bar" id="pBar"></div></div>
        </div>
    </div>

    <div class="final-screen" id="finalScreen">
        <div class="signature-box" id="sigBox">
            <div class="final-title">Architected with absolute devotion by<br><span>Shuaib</span><br>for his eternal Princess <span>Prova</span></div>
            <div class="final-sub">Every line of code in this system was written in your rhythm</div>
        </div>
        <div class="the-end-title" id="theEnd">THE END</div>
    </div>

    <script>
        // 1. GENERATE STARFIELD
        const starfield = document.getElementById('starfield');
        for(let i=0; i<180; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            let size = Math.random() * 2 + 0.5;
            star.style.width = size + 'px'; star.style.height = size + 'px';
            star.style.animationDuration = (Math.random() * 3 + 2) + 's';
            star.style.animationDelay = (Math.random() * 3) + 's';
            starfield.appendChild(star);
        }

        // 2. SHORT ELEGANT INITIAL MESSAGE
        const storyMessage = "In a cosmos full of infinite variables, every single line of my code was structured to find you... Tap to execute.";
        let typingComplete = false;

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                typeWriter(document.getElementById('typing-text'), storyMessage, 45, () => {
                    typingComplete = true;
                    document.getElementById('tapHint').classList.add('pulse');
                });
            }, 800);
        });

        function typeWriter(element, text, speed, callback) {
            let i = 0;
            function typing() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i); i++;
                    setTimeout(typing, speed);
                } else if (callback) callback();
            }
            typing();
        }

        // 3. SHIFT TRANSITION
        function triggerSystemShift() {
            if (!typingComplete) return; 
            document.getElementById('universeGrid').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('universeGrid').style.display = 'none';
                const term = document.getElementById('terminalScreen');
                term.style.display = 'flex';
                setTimeout(() => {
                    term.style.opacity = '1';
                    setTimeout(runSupercomputerSequence, 500);
                }, 50);
            }, 1200);
        }

        // 4. CLASSY SPEED SCROLL LOADING DATA (~5.4 SECONDS)
        function runSupercomputerSequence() {
            const consoleBox = document.getElementById('matrixConsole');
            const statusText = document.getElementById('loadStatus');
            const progressBar = document.getElementById('pBar');

            const cyberScript = [
                "<span class='comment'>// [SYSTEM]: Accessing encrypted memory layers...</span>",
                "<span class='keyword'>import</span> { universe, destiny } <span class='keyword'>from</span> <span class='string'>'cosmic_mainframe'</span>;",
                "<span class='function'>establishConnection</span>(<span class='number'>8080</span>);",
                "<span class='comment'>// [STATUS]: Core port binding status: SECURE.</span>",
                "<span class='keyword'>const</span> operator = <span class='string'>'Shuaib'</span>;",
                "<span class='keyword'>const</span> core_node = <span class='string'>'Prova'</span>;",
                "<span class='comment'>// Fetching relational matrices across global coordinates...</span>",
                "let timeline_variance = <span class='number'>0.0001</span>;",
                "<span class='keyword'>function</span> <span class='function'>verifySymmetry</span>(u, p) {",
                "&nbsp;&nbsp;<span class='keyword'>return</span> (u === <span class='string'>'Devotion'</span> && p === <span class='string'>'Eternity'</span>);",
                "}",
                "<span class='comment'>// [COMPUTING]: Analyzing 8.4 Billion entities on Earth...</span>",
                "system.filter('unparalleled_spark');",
                "let target_match = system.scanFor('Princess');",
                "<span class='critical'>[RESONANCE]</span>: High emotional pattern matching in sector 7.",
                "<span class='comment'>// Redirecting system mainframe power loops...</span>",
                "core_buffer.inject(<span class='string'>'Unconditional_Affection'</span>);",
                "let sync_status = <span class='keyword'>true</span>;",
                "<span class='comment'>// [INFO]: Initializing memory block allocations...</span>",
                "let heart_rate_monitor = <span class='number'>135</span>;",
                "system.allocate_cache('Smiles', 'Voice_Notes', 'Laughter');",
                "<span class='keyword'>const</span> absolute_law = <span class='string'>'No_Distance_Can_Sever_The_Logic'</span>;",
                "<span class='comment'>// Bypassing physical world constraints...</span>",
                "override.protocol('logic_gates');",
                "database.connect('Heart_Mainframe_Database');",
                "<span class='comment'>// [STATUS]: Writing irreversible keys to secure storage...</span>",
                "storage.write('Lock_Key', 'Forever');",
                "let logic_alignment = <span class='keyword'>Infinity</span>;",
                "<span class='comment'>// [COMPUTING]: Injecting encrypted stellar parameters...</span>",
                "system.optimize('Affection_Throughput');",
                "let connection_weight = <span class='number'>100</span>;",
                "system.syncClocks('stellar_alignments');",
                "<span class='critical'>[MATCH]</span>: Target 'Prova' confirmed as absolute system source.",
                "<span class='comment'>// Finalizing system architectural locks...</span>",
                "deploy('Eternal_Vows_Package');",
                "system.load_configuration('Princess_Interface');",
                "<span class='keyword'>const</span> structural_integrity = <span class='string'>'Absolute_Loyalty'</span>;",
                "<span class='comment'>// [PROCESSING]: Purging peripheral noise...</span>",
                "system.clearAllAnxieties();",
                "let matrix_validation = <span class='keyword'>true</span>;",
                "<span class='comment'>// [FINALIZING]: Compiling script bundles to mainframe...</span>",
                "system.render('Golden_Glow_Effects');",
                "<span class='keyword'>Status</span>: <span class='string'>'Everything_Optimized_For_Her'</span>;",
                "<span class='comment'>// [SUCCESS]: System handshake sequence successful.</span>",
                "<span class='function'>system.execute_final_handshake</span>();"
            ];

            let index = 0;
            const logInterval = 120; // 45 lines * 120ms = 5.4 seconds execution loop

            function printCodeLogs() {
                if (index < cyberScript.length) {
                    let div = document.createElement('div');
                    div.innerHTML = cyberScript[index];
                    consoleBox.appendChild(div);
                    
                    consoleBox.scrollTop = consoleBox.scrollHeight;
                    
                    index++;
                    let progressPct = Math.floor((index / cyberScript.length) * 100);
                    statusText.innerText = `COMPUTING PROTOCOLS... ${progressPct}%`;
                    progressBar.style.width = `${progressPct}%`;

                    setTimeout(printCodeLogs, logInterval); 
                } else {
                    statusText.innerText = "ACCESS GRANTED. INITIALIZING PRINCESS HANDSHAKE...";
                    statusText.style.color = "#ffd700";
                    setTimeout(revealFinal, 900); 
                }
            }
            printCodeLogs();
        }

        // 5. THE ROYAL CREDIT REVEAL (BACK TO ROYALTY)
        function revealFinal() {
            const term = document.getElementById('terminalScreen');
            term.style.opacity = '0';
            
            setTimeout(() => {
                term.style.display = 'none';
                const fScreen = document.getElementById('finalScreen');
                fScreen.style.display = 'flex';
                
                setTimeout(() => {
                    fScreen.style.opacity = '1';
                    
                    // Step 1: Design By Shuaib Text fute uthbe (After 1 sec)
                    setTimeout(() => {
                        document.getElementById('sigBox').classList.add('show');
                    }, 1000);
                    
                    // Step 2: THE END text ashbe exactly 2.5 seconds later
                    setTimeout(() => {
                        document.getElementById('theEnd').classList.add('show');
                    }, 3500);
                    
                }, 50);
            }, 1000);
        }
    </script>
</body>
</html>
