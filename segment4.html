<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Theorem of Us | Final Proof</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300&family=Dancing+Script:wght@700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: white; font-family: 'Montserrat', sans-serif;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        #starCanvas { position: absolute; top: 0; left: 0; z-index: 1; }

        .final-container {
            position: relative; z-index: 2; text-align: center;
            width: 90%; max-width: 500px;
        }

        .theorem-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 30px; border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.2);
            animation: fadeIn 2.5s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Gallery Styling */
        .image-gallery {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 25px;
        }
        .couple-pic {
            width: 130px; height: 130px; object-fit: cover;
            border-radius: 20px; border: 2px solid #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
            transition: 0.5s;
        }
        .couple-pic:hover { transform: scale(1.05) rotate(2deg); }
        
        .final-message { 
            font-family: 'Dancing Script', cursive; font-size: 1.6rem; 
            line-height: 1.5; color: #fff; margin-bottom: 30px;
        }

        .buttons-div { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }

        .choice-btn {
            padding: 15px 40px; font-family: 'Cinzel'; font-size: 0.9rem;
            cursor: pointer; border-radius: 50px; transition: 0.5s; letter-spacing: 2px;
        }

        #yesBtn { background: #00d2ff; color: #000; border: none; box-shadow: 0 0 20px #00d2ff; font-weight: bold; }
        #yesBtn:hover { transform: scale(1.1); box-shadow: 0 0 40px #00d2ff; }

        #noBtn { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; position: relative; }

        #bg-music { display: none; }
    </style>
</head>
<body onload="initStars(); resumeMusic();">

    <audio id="bg-music" loop>
        <source src="music2.mp3" type="audio/mpeg">
    </audio>

    <canvas id="starCanvas"></canvas>

    <div class="final-container">
        <div class="theorem-box">
            <div class="image-gallery">
                <img src="4segment1.jpg" class="couple-pic" alt="Us">
                <img src="4segment2.jpg" class="couple-pic" alt="Rapunzel & Eugene">
            </div>

            <div class="final-message">
                "In this infinite universe of variables, <br>
                I've found my only absolute truth.<br><br>
                Will you be my 'Constant' forever, Prova?"
            </div>
            
            <div class="buttons-div">
                <button id="yesBtn" class="choice-btn" onclick="goToSegment5()">YES</button>
                <button id="noBtn" class="choice-btn" onmouseover="moveNo()">NO</button>
            </div>
        </div>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        function resumeMusic() {
            const savedTime = localStorage.getItem('audioTime');
            if (savedTime) music.currentTime = parseFloat(savedTime);
            music.play().catch(() => {});
        }

        function moveNo() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.position = 'absolute';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function goToSegment5() {
            localStorage.setItem('audioTime', music.currentTime);
            window.location.href = 'segment5.html'; 
        }

        // --- CONSTANT MOVING STARFIELD ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2 + 0.5,
                    vx: (Math.random() - 0.5) * 0.5, // Slight horizontal drift
                    vy: Math.random() * 0.8 + 0.2,   // Constant downward fall
                    opacity: Math.random()
                });
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.x += s.vx;
                s.y += s.vy;
                
                // Reset stars when they go off screen for "always moving" effect
                if (s.y > canvas.height) s.y = 0;
                if (s.x > canvas.width) s.x = 0;
                if (s.x < 0) s.x = canvas.width;

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            initStars();
        });
    </script>
</body>
</html>
