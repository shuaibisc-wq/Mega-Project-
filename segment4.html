<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Theorem of Us | Final Proof</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;500&family=Dancing+Script:wght@700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body, html { 
            width: 100%; height: 100%; 
            background: #030108; color: white; font-family: 'Montserrat', sans-serif;
            overflow: hidden; 
        }

        #starCanvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* --- PREMIUM AURORA BACKDROP --- */
        .aurora-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 15% 30%, rgba(0, 210, 255, 0.25), transparent 45%),
                radial-gradient(circle at 85% 70%, rgba(147, 83, 211, 0.25), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(0, 255, 150, 0.1), transparent 60%);
            z-index: 0; filter: blur(40px);
            animation: auroraAnimate 12s infinite alternate ease-in-out;
        }
        @keyframes auroraAnimate {
            0% { opacity: 0.6; transform: scale(1) rotate(0deg); }
            100% { opacity: 1; transform: scale(1.1) rotate(2deg); }
        }

        /* --- CONTENT WRAPPER --- */
        .content-wrapper {
            position: relative; z-index: 2;
            height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-evenly; 
            padding: 3vh 0;
        }

        /* --- DYNAMIC AUTO-FIT FRAMES (NO CROPPING) --- */
        .image-frame {
            display: inline-block; /* Auto-shrinks to fit the image exactly */
            max-width: 90%; 
            border-radius: 12px;
            padding: 6px; /* Creates a beautiful glass border around the pic */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 210, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 210, 255, 0.15);
            animation: floatUpDown 4.5s infinite alternate ease-in-out;
        }

        .image-frame img {
            display: block;
            max-width: 100%; 
            max-height: 24vh; /* Adjusts height automatically based on screen, never squishes */
            width: auto; 
            height: auto;
            border-radius: 8px; /* Soft curves for the image itself */
            filter: contrast(1.05) brightness(1.05);
        }

        .frame-2 { animation-delay: -2s; animation-duration: 5s; } /* Opposite float for balance */

        @keyframes floatUpDown {
            0% { transform: translateY(-6px); }
            100% { transform: translateY(6px); }
        }

        /* --- THE CONSTANT PROPOSAL BOX --- */
        .proposal-box {
            position: relative; z-index: 10;
            background: rgba(15, 10, 30, 0.65);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 25px 20px; border-radius: 20px;
            backdrop-filter: blur(20px); text-align: center;
            width: 88%; max-width: 420px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9), 0 0 30px rgba(0, 210, 255, 0.15) inset;
        }

        .final-msg { 
            font-family: 'Dancing Script', cursive; 
            font-size: clamp(1.4rem, 5.5vw, 1.8rem); 
            line-height: 1.4; color: #fff; margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .highlight { 
            color: #00d2ff; font-family: 'Montserrat', sans-serif; 
            font-weight: 500; font-size: clamp(1rem, 4vw, 1.1rem); 
            display: block; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* --- INTERACTIVE BUTTONS --- */
        .btn-group { 
            display: flex; justify-content: center; gap: 15px; 
            position: relative; height: 45px;
        }

        .choice-btn {
            padding: 10px 30px; font-family: 'Cinzel', serif; font-size: 0.9rem;
            cursor: pointer; border-radius: 50px; transition: all 0.3s ease; 
            letter-spacing: 2px; font-weight: bold; outline: none;
        }

        #yesBtn { 
            background: linear-gradient(45deg, #00d2ff, #0077ff); 
            color: #fff; border: none; 
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.6); 
            animation: heartbeat 1.5s infinite;
        }
        #yesBtn:hover { transform: scale(1.1); box-shadow: 0 0 25px rgba(0, 210, 255, 0.9); }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.05); }
            30% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        #noBtn { 
            background: rgba(255, 77, 77, 0.1); color: #ff4d4d; 
            border: 1px solid #ff4d4d; position: relative; 
            backdrop-filter: blur(5px);
            z-index: 100;
        }
    </style>
</head>
<body onload="initSystem(); resumeMusic();">

    <audio id="bg-music" loop>
        <source src="music2.mp3" type="audio/mpeg">
    </audio>

    <div class="aurora-bg"></div>
    <canvas id="starCanvas"></canvas>

    <div class="content-wrapper">
        <!-- IMAGE 1 (Auto-fits picture perfectly) -->
        <div class="image-frame">
            <img src="4segment1.jpg" alt="Moment 1">
        </div>

        <!-- PROPOSAL BOX -->
        <div class="proposal-box">
            <p class="final-msg">
                "In this infinite universe of variables, <br>
                I've found my only absolute truth."<br>
                <span class="highlight">Will you be my 'Constant' forever, Prova?</span>
            </p>

            <div class="btn-group">
                <button id="yesBtn" class="choice-btn" onclick="goToSegment5()">YES</button>
                <button id="noBtn" class="choice-btn" onmouseover="moveNo()" onpointerdown="moveNo(event)">NO</button>
            </div>
        </div>

        <!-- IMAGE 2 (Auto-fits picture perfectly) -->
        <div class="image-frame frame-2">
            <img src="4segment2.jpg" alt="Moment 2">
        </div>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        function resumeMusic() {
            const savedTime = localStorage.getItem('audioTime');
            if (savedTime) music.currentTime = parseFloat(savedTime);
            music.play().catch(() => {});
        }

        // --- SMOOTH EVASION LOGIC FOR 'NO' BUTTON ---
        function moveNo(e) {
            if(e) e.preventDefault(); 
            const btn = document.getElementById('noBtn');
            
            if (btn.style.position !== 'fixed') {
                const rect = btn.getBoundingClientRect();
                btn.style.left = rect.left + 'px';
                btn.style.top = rect.top + 'px';
                btn.style.position = 'fixed';
            }

            const btnWidth = btn.offsetWidth;
            const btnHeight = btn.offsetHeight;
            const maxX = window.innerWidth - btnWidth - 20;
            const maxY = window.innerHeight - btnHeight - 20;

            const x = Math.max(20, Math.floor(Math.random() * maxX));
            const y = Math.max(20, Math.floor(Math.random() * maxY));
            
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function goToSegment5() {
            localStorage.setItem('audioTime', music.currentTime);
            window.location.href = 'segment5.html'; 
        }

        // --- ADVANCED CANVAS: 1000 STARS + SHOOTING STARS ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let shootingStars = [];

        function initSystem() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            for (let i = 0; i < 1000; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.2 + 0.1,
                    vy: Math.random() * 0.2 + 0.05,
                    opacity: Math.random(),
                    pulse: Math.random() * 0.02 + 0.01,
                    color: Math.random() > 0.8 ? '#00d2ff' : '#ffffff' 
                });
            }
            animate();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class ShootingStar {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = 0;
                this.length = Math.random() * 80 + 20;
                this.speed = Math.random() * 10 + 5;
                this.opacity = 1;
                this.angle = Math.PI / 4 + (Math.random() * 0.2 - 0.1);
            }
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.opacity -= 0.02;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                const grad = ctx.createLinearGradient(0, 0, -this.length, 0);
                grad.addColorStop(0, `rgba(255, 255, 255, ${this.opacity})`);
                grad.addColorStop(1, `rgba(255, 255, 255, 0)`);
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(-this.length, 1);
                ctx.lineTo(-this.length, -1);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            stars.forEach(s => {
                s.y += s.vy;
                s.opacity += s.pulse;
                if (s.opacity > 1 || s.opacity < 0.1) s.pulse = -s.pulse;
                if (s.y > canvas.height) s.y = 0;

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = s.color;
                ctx.globalAlpha = Math.max(0, Math.min(1, s.opacity));
                ctx.fill();
            });
            ctx.globalAlpha = 1;

            if (Math.random() < 0.02) {
                shootingStars.push(new ShootingStar());
            }

            for (let i = shootingStars.length - 1; i >= 0; i--) {
                shootingStars[i].update();
                shootingStars[i].draw();
                if (shootingStars[i].opacity <= 0 || shootingStars[i].y > canvas.height) {
                    shootingStars.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
