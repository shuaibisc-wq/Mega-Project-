<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Theorem of Us | Final Proof</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300&family=Dancing+Script:wght@700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: white; font-family: 'Montserrat', sans-serif;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
        }

        #starCanvas { position: absolute; top: 0; left: 0; z-index: 1; }

        .final-container {
            position: relative; z-index: 2; text-align: center;
            width: 90%; max-width: 600px;
        }

        .theorem-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 210, 255, 0.3);
            padding: 40px; border-radius: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.1);
            animation: fadeIn 3s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .final-title { font-family: 'Cinzel'; font-size: 1.5rem; color: #00d2ff; letter-spacing: 5px; margin-bottom: 20px; }
        
        .final-message { 
            font-family: 'Dancing Script', cursive; font-size: 1.8rem; 
            line-height: 1.6; color: #fff; margin-bottom: 30px;
        }

        .buttons-div { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }

        .choice-btn {
            padding: 15px 40px; font-family: 'Cinzel'; font-size: 1rem;
            cursor: pointer; border-radius: 50px; transition: 0.5s; letter-spacing: 2px;
        }

        #yesBtn { background: #00d2ff; color: #000; border: none; box-shadow: 0 0 20px #00d2ff; }
        #yesBtn:hover { transform: scale(1.1); box-shadow: 0 0 40px #00d2ff; }

        #noBtn { 
            background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d;
            position: relative;
        }

        #bg-music { display: none; }
    </style>
</head>
<body onload="initFinalScene(); resumeMusic();">

    <audio id="bg-music" loop>
        <source src="music2.mp3" type="audio/mpeg">
    </audio>

    <canvas id="starCanvas"></canvas>

    <div class="final-container">
        <div class="theorem-box">
            <div class="final-title">Q.E.D.</div>
            <div class="final-message">
                "After calculating every variable and exploring every galaxy, the result is always the same...<br><br>
                Tumi-i amar shob equation-er shesh, <br>
                Will you be my 'Constant' forever, Prova?"
            </div>
            
            <div class="buttons-div">
                <button id="yesBtn" class="choice-btn" onclick="celebrate()">YES</button>
                <button id="noBtn" class="choice-btn" onmouseover="moveNo()">NO</button>
            </div>
        </div>
    </div>

    <script>
        // Music Persistence
        const music = document.getElementById('bg-music');
        function resumeMusic() {
            const savedTime = localStorage.getItem('audioTime');
            if (savedTime) music.currentTime = parseFloat(savedTime);
            music.play().catch(() => {});
        }

        // Logic for the 'No' button running away (Impossible to click)
        function moveNo() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.position = 'absolute';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function celebrate() {
            // Redirect to a final 'Success' page or trigger a full screen explosion
            alert("Theorem Proved! ❤️ I Love You, Prova!");
            // Optional: window.location.href = 'celebration.html';
        }

        // --- PARTICLE HEART & STARFIELD ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initFinalScene() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<250; i++) {
                particles.push(new Particle());
            }
            draw();
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
                this.color = Math.random() > 0.5 ? '#00d2ff' : '#ffffff';
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }

            update() {
                // Here we can add a logic to pulse the heart shape if needed
                // For now, let's keep them as high-quality twinkling stars
                this.x += Math.sin(Date.now() * 0.001) * 0.5;
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
