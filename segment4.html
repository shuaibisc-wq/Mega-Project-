<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Theorem of Us | Final Proof</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300&family=Dancing+Script:wght@700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: white; font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        #starCanvas { position: absolute; top: 0; left: 0; z-index: 1; }

        /* Aurora Background Effect */
        .aurora {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(0, 210, 255, 0.15), transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(112, 0, 255, 0.15), transparent 50%);
            z-index: 0; filter: blur(60px); opacity: 0.8;
            animation: auroraMove 10s infinite alternate;
        }

        @keyframes auroraMove {
            0% { transform: scale(1); } 100% { transform: scale(1.1); }
        }

        /* Vertical Alignment like Segment 2 */
        .final-wrapper {
            position: relative; z-index: 2;
            height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px;
        }

        .pic-container {
            width: 180px; height: 180px;
            border-radius: 25px; border: 2px solid rgba(0, 210, 255, 0.5);
            overflow: hidden; box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
            transition: 0.8s ease;
        }

        .pic-container img { width: 100%; height: 100%; object-fit: cover; }

        .theorem-text-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px; border-radius: 20px;
            backdrop-filter: blur(15px); text-align: center;
            max-width: 85%; box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .final-message { 
            font-family: 'Dancing Script', cursive; font-size: 1.5rem; 
            line-height: 1.4; color: #fff; margin: 0;
        }

        .buttons-div { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }

        .choice-btn {
            padding: 12px 35px; font-family: 'Cinzel'; font-size: 0.9rem;
            cursor: pointer; border-radius: 50px; transition: 0.4s; letter-spacing: 2px;
        }

        #yesBtn { background: #00d2ff; color: #000; border: none; box-shadow: 0 0 15px #00d2ff; font-weight: bold; }
        #noBtn { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; position: relative; }

        #bg-music { display: none; }
    </style>
</head>
<body onload="initStars(); resumeMusic();">

    <audio id="bg-music" loop>
        <source src="music2.mp3" type="audio/mpeg">
    </audio>

    <div class="aurora"></div>
    <canvas id="starCanvas"></source>

    <div class="final-wrapper">
        <div class="pic-container">
            <img src="4segment1.jpg" alt="Our Moment">
        </div>

        <div class="theorem-text-box">
            <p class="final-message">
                "In this infinite universe of variables, <br>
                I've found my only absolute truth.<br><br>
                Will you be my 'Constant' forever, Prova?"
            </p>
            
            <div class="buttons-div">
                <button id="yesBtn" class="choice-btn" onclick="goToSegment5()">YES</button>
                <button id="noBtn" class="choice-btn" onmouseover="moveNo()">NO</button>
            </div>
        </div>

        <div class="pic-container">
            <img src="4segment2.jpg" alt="Rapunzel & Eugene">
        </div>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        function resumeMusic() {
            const savedTime = localStorage.getItem('audioTime');
            if (savedTime) music.currentTime = parseFloat(savedTime);
            music.play().catch(() => {});
        }

        function moveNo() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function goToSegment5() {
            localStorage.setItem('audioTime', music.currentTime);
            window.location.href = 'segment5.html'; 
        }

        // --- ENHANCED STARFIELD (MORE STARS + DRIFT) ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Star count increased to 400
            for (let i = 0; i < 400; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.5 + 0.2,
                    vx: (Math.random() - 0.5) * 0.3,
                    vy: Math.random() * 0.5 + 0.1,
                    opacity: Math.random(),
                    pulse: Math.random() * 0.02
                });
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.y += s.vy;
                s.x += s.vx;
                s.opacity += s.pulse;

                if (s.opacity > 1 || s.opacity < 0.3) s.pulse = -s.pulse;
                if (s.y > canvas.height) s.y = 0;
                if (s.x > canvas.width) s.x = 0;
                if (s.x < 0) s.x = canvas.width;

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            initStars();
        });
    </script>
</body>
</html>
