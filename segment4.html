<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Theorem of Us | Final Proof</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300&family=Dancing+Script:wght@700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: white; font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        #starCanvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* Powerful Aurora Backdrop */
        .aurora-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(0, 210, 255, 0.3), transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(112, 0, 255, 0.3), transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(0, 255, 150, 0.15), transparent 60%);
            z-index: 0; filter: blur(60px);
            animation: auroraAnimate 10s infinite alternate linear;
        }

        @keyframes auroraAnimate {
            0% { opacity: 0.7; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* Fully Responsive Content Wrapper */
        .content-wrapper {
            position: relative; z-index: 2;
            height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-evenly; 
            padding: 10px 0;
        }

        /* Responsive Landscape Frame */
        .landscape-frame {
            width: 90%; /* Adapts to any screen width */
            max-width: 500px; 
            aspect-ratio: 16 / 9;
            border-radius: 12px; 
            border: 1px solid rgba(0, 210, 255, 0.4);
            overflow: hidden; 
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.2);
            background: rgba(255, 255, 255, 0.02);
        }
        .landscape-frame img { 
            width: 100%; height: 100%; 
            object-fit: contain; /* Ensures the whole picture is visible */
        }

        /* Centered Proposal Box */
        .proposal-box {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 20px;
            backdrop-filter: blur(20px); text-align: center;
            width: 85%; max-width: 400px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.8);
        }

        .final-msg { 
            font-family: 'Dancing Script', cursive; 
            font-size: clamp(1.3rem, 5vw, 1.7rem); /* Auto-sizes font */
            line-height: 1.4; color: #fff; margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.4);
        }

        .btn-group { display: flex; justify-content: center; gap: 15px; }

        .choice-btn {
            padding: 12px 30px; font-family: 'Cinzel'; font-size: 0.85rem;
            cursor: pointer; border-radius: 50px; transition: 0.3s; 
            letter-spacing: 2px; font-weight: bold;
        }

        #yesBtn { background: #00d2ff; color: #000; border: none; box-shadow: 0 0 20px rgba(0, 210, 255, 0.5); }
        #noBtn { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; position: relative; }

        #bg-music { display: none; }
    </style>
</head>
<body onload="initStars(); resumeMusic();">

    <audio id="bg-music" loop>
        <source src="music2.mp3" type="audio/mpeg">
    </audio>

    <div class="aurora-bg"></div>
    <canvas id="starCanvas"></canvas>

    <div class="content-wrapper">
        <div class="landscape-frame">
            <img src="4segment1.jpg" alt="Moment 1">
        </div>

        <div class="proposal-box">
            <p class="final-msg">
                "In this infinite universe of variables, <br>
                I've found my only absolute truth.<br><br>
                Will you be my 'Constant' forever, Prova?"
            </p>
            
            <div class="btn-group">
                <button id="yesBtn" class="choice-btn" onclick="goToSegment5()">YES</button>
                <button id="noBtn" class="choice-btn" onmouseover="moveNo()">NO</button>
            </div>
        </div>

        <div class="landscape-frame">
            <img src="4segment2.jpg" alt="Moment 2">
        </div>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        function resumeMusic() {
            const savedTime = localStorage.getItem('audioTime');
            if (savedTime) music.currentTime = parseFloat(savedTime);
            music.play().catch(() => {});
        }

        function moveNo() {
            const btn = document.getElementById('noBtn');
            const x = Math.max(10, Math.random() * (window.innerWidth - btn.offsetWidth - 10));
            const y = Math.max(10, Math.random() * (window.innerHeight - btn.offsetHeight - 10));
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function goToSegment5() {
            localStorage.setItem('audioTime', music.currentTime);
            window.location.href = 'segment5.html'; 
        }

        // --- EXTREME STARFIELD (1000 STARS FOR FULL EFFECT) ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < 1000; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.4 + 0.1,
                    vy: Math.random() * 0.3 + 0.1,
                    opacity: Math.random(),
                    pulse: Math.random() * 0.02 + 0.01
                });
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.y += s.vy;
                s.opacity += s.pulse;
                if (s.opacity > 1 || s.opacity < 0.2) s.pulse = -s.pulse;
                if (s.y > canvas.height) s.y = 0;

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            initStars();
        });
    </script>
</body>
</html>
