<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Theorem of Us | Final Proof</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300&family=Dancing+Script:wght@700&display=swap');
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: white; font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Canvas for Stars */
        #starCanvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* Dynamic Aurora Background */
        .aurora-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.2), transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(112, 0, 255, 0.2), transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(0, 255, 150, 0.1), transparent 50%);
            z-index: 0; filter: blur(80px);
            animation: auroraAnimate 15s infinite alternate ease-in-out;
        }

        @keyframes auroraAnimate {
            0% { opacity: 0.5; transform: scale(1) rotate(0deg); }
            100% { opacity: 0.9; transform: scale(1.2) rotate(5deg); }
        }

        /* Full Height Wrapper for Vertical Alignment */
        .content-wrapper {
            position: relative; z-index: 2;
            height: 100vh; width: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: space-evenly; /* Even spacing like Segment 2 */
            padding: 20px 0;
        }

        /* Image Containers */
        .pic-frame {
            width: 220px; height: 220px;
            border-radius: 20px; border: 2px solid rgba(0, 210, 255, 0.4);
            overflow: hidden; box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            transition: 0.5s ease;
        }
        .pic-frame img { width: 100%; height: 100%; object-fit: cover; }
        .pic-frame:hover { transform: scale(1.05); border-color: #00d2ff; }

        /* Middle Glassmorphism Text Box */
        .proposal-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px 25px; border-radius: 25px;
            backdrop-filter: blur(20px); text-align: center;
            max-width: 85%; width: 350px;
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.8);
        }

        .final-msg { 
            font-family: 'Dancing Script', cursive; font-size: 1.7rem; 
            line-height: 1.4; color: #fff; margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .btn-group { display: flex; justify-content: center; gap: 20px; }

        .choice-btn {
            padding: 14px 35px; font-family: 'Cinzel'; font-size: 0.9rem;
            cursor: pointer; border-radius: 50px; transition: 0.3s; 
            letter-spacing: 2px; font-weight: bold;
        }

        #yesBtn { background: #00d2ff; color: #000; border: none; box-shadow: 0 0 20px rgba(0, 210, 255, 0.6); }
        #yesBtn:hover { transform: scale(1.1); box-shadow: 0 0 40px #00d2ff; }

        #noBtn { background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; position: relative; }

        #bg-music { display: none; }
    </style>
</head>
<body onload="initStars(); resumeMusic();">

    <audio id="bg-music" loop>
        <source src="music2.mp3" type="audio/mpeg">
    </audio>

    <div class="aurora-bg"></div>
    <canvas id="starCanvas"></canvas>

    <div class="content-wrapper">
        <div class="pic-frame">
            <img src="4segment1.jpg" alt="Our Picture">
        </div>

        <div class="proposal-box">
            <p class="final-msg">
                "In this infinite universe of variables, <br>
                I've found my only absolute truth.<br><br>
                Will you be my 'Constant' forever, Prova?"
            </p>
            
            <div class="btn-group">
                <button id="yesBtn" class="choice-btn" onclick="goToSegment5()">YES</button>
                <button id="noBtn" class="choice-btn" onmouseover="moveNo()">NO</button>
            </div>
        </div>

        <div class="pic-frame">
            <img src="4segment2.jpg" alt="Rapunzel & Eugene">
        </div>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        function resumeMusic() {
            const savedTime = localStorage.getItem('audioTime');
            if (savedTime) music.currentTime = parseFloat(savedTime);
            music.play().catch(() => {});
        }

        // Running away 'NO' button
        function moveNo() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function goToSegment5() {
            localStorage.setItem('audioTime', music.currentTime);
            window.location.href = 'segment5.html'; 
        }

        // --- DENSE STARFIELD (500 STARS + DRIFT) ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < 550; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.6 + 0.1,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: Math.random() * 0.6 + 0.1,
                    opacity: Math.random(),
                    pulse: Math.random() * 0.02 + 0.005
                });
            }
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.y += s.vy;
                s.x += s.vx;
                s.opacity += s.pulse;

                if (s.opacity > 1 || s.opacity < 0.2) s.pulse = -s.pulse;
                if (s.y > canvas.height) s.y = 0;
                if (s.x > canvas.width) s.x = 0;
                if (s.x < 0) s.x = canvas.width;

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            initStars();
        });
    </script>
</body>
</html>
