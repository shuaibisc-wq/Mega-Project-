<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Jaan's 18th Birthday - Celebration</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,600;1,400&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --royal-purple: #0f051d;
            --velvet-glow: #240b36;
            --gold-metallic: #d4af37;
            --rose-gold: #b76e79;
            --champagne: #f9f6f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, var(--royal-purple), var(--velvet-glow));
            font-family: 'Montserrat', sans-serif;
        }

        /* High-performance canvas container */
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Glassmorphism Dynamic UI Wrapper optimized for Samsung A06 */
        .celebration-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            width: 90%;
            max-width: 400px;
            padding: 30px 20px;
            background: rgba(15, 5, 29, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 
                        0 0 30px rgba(183, 110, 121, 0.15);
            animation: containerFadeIn 1.5s ease-out forwards;
        }

        @keyframes containerFadeIn {
            from { opacity: 0; transform: translate(-50%, -45%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        .royal-title {
            font-family: 'Playfair Display', serif;
            color: var(--gold-metallic);
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
        }

        .romantic-text {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            color: var(--champagne);
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        /* Premium Next Button */
        .next-btn {
            display: inline-block;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--royal-purple);
            background: linear-gradient(45deg, var(--gold-metallic), #f3e5ab);
            padding: 14px 35px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .next-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body>

    <canvas id="fireworksCanvas"></canvas>

    <div class="celebration-container">
        <h1 class="royal-title">A Grand Symphony</h1>
        <p class="romantic-text">
            "Look up at the illuminated heavens, My Jaan. Every single starburst and floating lantern carries a wish meant only for you on this magnificent night."
        </p>
        <a href="javascript:void(0);" class="next-btn" onclick="navigateToNext()">Proceed</a>
    </div>

    <script>
        // --- HIGH-PRECISION AUDIO CONTINUITY ENGINE ---
        let audio = new Audio();
        audio.src = 'music7.mp3';
        audio.loop = true;

        function syncAndPlayAudio() {
            const savedTime = localStorage.getItem('music7_time');
            if (savedTime !== null) {
                audio.currentTime = parseFloat(savedTime);
            }

            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => {
                    const forceSyncPlay = () => {
                        const activeTime = localStorage.getItem('music7_time');
                        if (activeTime !== null && audio.paused) {
                            audio.currentTime = parseFloat(activeTime);
                        }
                        audio.play();
                        window.removeEventListener('click', forceSyncPlay);
                        window.removeEventListener('touchstart', forceSyncPlay);
                    };
                    window.addEventListener('click', forceSyncPlay);
                    window.addEventListener('touchstart', forceSyncPlay);
                });
            }
        }

        audio.addEventListener('timeupdate', () => {
            if (!audio.paused) {
                localStorage.setItem('music7_time', audio.currentTime);
            }
        });

        function navigateToNext() {
            localStorage.setItem('music7_time', audio.currentTime);
            window.location.href = 'segment9.html'; 
        }

        window.addEventListener('DOMContentLoaded', syncAndPlayAudio);
        window.addEventListener('pageshow', syncAndPlayAudio);


        // --- BALANCED FIREWORKS & FANUS CELESTIAL ENGINE ---
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let fireworks = [];
        let particles = [];
        let lanterns = []; 

        const colorPalette = [
            'rgba(214, 175, 87, ',  
            'rgba(183, 110, 121, ',  
            'rgba(249, 246, 240, ',  
            'rgba(155, 89, 182, ',   
            'rgba(231, 76, 60, ',    
            'rgba(52, 152, 219, '    
        ];

        // --- CELESTIAL FANUS (SKY LANTERN) CLASS ---
        class Lantern {
            constructor() {
                this.x = randomRange(20, canvas.width - 20);
                this.y = canvas.height + randomRange(10, 100);
                this.speedX = randomRange(-0.2, 0.2);
                this.speedY = randomRange(-0.4, -0.9); 
                this.size = randomRange(8, 16);
                this.glow = randomRange(0.5, 0.9);
                this.oscillateSpeed = randomRange(0.01, 0.03);
                this.degree = randomRange(0, Math.PI);
            }

            update(index) {
                this.x += this.speedX + Math.sin(this.degree) * 0.15;
                this.y += this.speedY;
                this.degree += this.oscillateSpeed;

                if (this.y < -50) {
                    lanterns.splice(index, 1);
                }
            }

            draw() {
                ctx.save();
                ctx.shadowBlur = this.size * 1.5;
                ctx.shadowColor = 'rgba(230, 126, 34, 0.8)'; 

                ctx.fillStyle = `rgba(243, 156, 18, ${this.glow})`;
                
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - this.size);
                ctx.lineTo(this.x + this.size * 0.7, this.y - this.size * 0.2);
                ctx.lineTo(this.x + this.size * 0.5, this.y + this.size * 0.8);
                ctx.lineTo(this.x - this.size * 0.5, this.y + this.size * 0.8);
                ctx.lineTo(this.x - this.size * 0.7, this.y - this.size * 0.2);
                ctx.closePath();
                ctx.fill();

                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 255, 255, ${this.glow + 0.1})`;
                ctx.arc(this.x, this.y + this.size * 0.6, this.size * 0.2, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // --- PERFECTLY BALANCED FIREWORKS ENGINE ---
        class Firework {
            constructor(sx, sy, tx, ty) {
                this.x = sx;
                this.y = sy;
                this.sx = sx;
                this.sy = sy;
                this.tx = tx;
                this.ty = ty;
                this.distanceToTarget = calculateDistance(sx, sy, tx, ty);
                this.distanceTraveled = 0;
                this.coordinates = [];
                this.coordinateCount = 3;
                while(this.coordinateCount--) {
                    this.coordinates.push([this.x, this.y]);
                }
                this.angle = Math.atan2(ty - sy, tx - sx);
                this.speed = 9; // BALANCED SPEED (Optimized between 6 and 12)
                this.acceleration = 1.02; // Smooth steady liftoff (Optimized between 1.015 and 1.03)
                this.color = colorPalette[Math.floor(Math.random() * colorPalette.length)] + '1)';
            }

            update(index) {
                this.coordinates.pop();
                this.coordinates.unshift([this.x, this.y]);
                this.speed *= this.acceleration;
                
                let vx = Math.cos(this.angle) * this.speed;
                let vy = Math.sin(this.angle) * this.speed;
                this.distanceTraveled = calculateDistance(this.sx, this.sy, this.x + vx, this.y + vy);

                if(this.distanceTraveled >= this.distanceToTarget) {
                    createExplosion(this.tx, this.ty, this.color);
                    fireworks.splice(index, 1);
                } else {
                    this.x += vx;
                    this.y += vy;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        class Particle {
            constructor(x, y, baseColor) {
                this.x = x;
                this.y = y;
                this.coordinates = [];
                this.coordinateCount = 5;
                while(this.coordinateCount--) {
                    this.coordinates.push([this.x, this.y]);
                }
                this.angle = randomRange(0, Math.PI * 2);
                this.speed = randomRange(1, 9); // BALANCED burst velocity dispersion
                this.friction = 0.955; 
                this.gravity = 0.13; // Balanced physics gravity falling drop weight
                this.baseColor = baseColor.split(',')[0] + ',' + baseColor.split(',')[1] + ',' + baseColor.split(',')[2] + ',';
                this.alpha = 1;
                this.decay = randomRange(0.006, 0.015); 
            }

            update(index) {
                this.coordinates.pop();
                this.coordinates.unshift([this.x, this.y]);
                this.speed *= this.friction;
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed + this.gravity;
                this.alpha -= this.decay;

                if(this.alpha <= 0) {
                    particles.splice(index, 1);
                }
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.coordinates[this.coordinates.length - 1][0], this.coordinates[this.coordinates.length - 1][1]);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = this.baseColor + this.alpha + ')';
                ctx.lineWidth = randomRange(1, 2.8); 
                ctx.stroke();
            }
        }

        function calculateDistance(p1x, p1y, p2x, p2y) {
            return Math.sqrt(Math.pow(p1x - p2x, 2) + Math.pow(p1y - p2y, 2));
        }

        function randomRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        function createExplosion(x, y, color) {
            let particleCount = 170; // High-payload glittering particles
            while(particleCount--) {
                particles.push(new Particle(x, y, color));
            }
        }

        let timerTick = 0;
        let timerTotal = 10; // BALANCED TIMING LAUNCH FREQUENCY (Optimized between 6 and 18)
        let lanternTick = 0;

        function loop() {
            requestAnimationFrame(loop);
            
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(15, 5, 29, 0.24)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'lighter';

            // 1. Lanterns (Fanus) Render Layer
            let l = lanterns.length;
            while(l--) {
                lanterns[l].draw();
                lanterns[l].update(l);
            }

            // 2. Fireworks Lift Rockets
            let i = fireworks.length;
            while(i--) {
                fireworks[i].draw();
                fireworks[i].update(i);
            }

            // 3. Burst Explosion Sparks
            let j = particles.length;
            while(j--) {
                particles[j].draw();
                particles[j].update(j);
            }

            // Background fanus auto spawn tracker
            lanternTick++;
            if(lanternTick % 40 === 0 && lanterns.length < 25) { 
                lanterns.push(new Lantern());
            }

            // Balanced automatic timed rocket launches
            if(timerTick >= timerTotal) {
                fireworks.push(new Firework(
                    canvas.width / 2 + randomRange(-120, 120), 
                    canvas.height, 
                    randomRange(60, canvas.width - 60), 
                    randomRange(60, canvas.height / 1.9)
                ));
                timerTick = 0;
            } else {
                timerTick++;
            }
        }

        window.addEventListener('pointerdown', (e) => {
            if(e.target.tagName !== 'A') { 
                fireworks.push(new Firework(e.clientX, canvas.height, e.clientX, e.clientY));
                fireworks.push(new Firework(e.clientX, canvas.height, e.clientX - 55, e.clientY - 28));
                fireworks.push(new Firework(e.clientX, canvas.height, e.clientX + 55, e.clientY - 28));
            }
        });

        // Seed early ambient lanterns on load
        for(let initial = 0; initial < 8; initial++) {
            let earlyLantern = new Lantern();
            earlyLantern.y = randomRange(100, canvas.height); 
            lanterns.push(earlyLantern);
        }

        loop();
    </script>
</body>
</html>
