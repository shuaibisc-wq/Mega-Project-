<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our New Dream</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            width: 100%; height: 100%;
            background: #04010a; 
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            overflow: hidden; 
        }

        /* --- BACKGROUND IMAGE SLIDER (KEN BURNS EFFECT) --- */
        #bg-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        .bg-slide {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center 20%; /* Focus on faces */
            opacity: 0; transition: opacity 3s ease-in-out;
            transform: scale(1.05); /* Start slightly zoomed */
            pointer-events: none;
        }

        .bg-slide.active { opacity: 1; animation: kenBurns 12s linear forwards; }

        @keyframes kenBurns {
            0% { transform: scale(1.05) translate(0, 0); }
            100% { transform: scale(1.15) translate(-10px, 10px); }
        }

        /* --- MAGIC OVERLAY (Makes text readable and adds mood) --- */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            background: linear-gradient(135deg, rgba(4, 1, 10, 0.8) 0%, rgba(147, 83, 211, 0.3) 50%, rgba(4, 1, 10, 0.9) 100%);
            mix-blend-mode: multiply;
        }

        #magicCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; }

        /* --- CINEMATIC TEXT CONTAINER --- */
        #text-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 30px; text-align: center;
        }

        .emotional-message {
            font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 2.2rem;
            color: #fff5ee; text-shadow: 0 4px 15px rgba(0, 0, 0, 0.9), 0 0 20px rgba(255, 215, 0, 0.5);
            line-height: 1.4; position: absolute;
            opacity: 0; transform: translateY(20px) scale(0.95);
            transition: opacity 2s ease, transform 2s ease;
        }

        .emotional-message.visible { opacity: 1; transform: translateY(0) scale(1); }
        .emotional-message.exit { opacity: 0; transform: translateY(-20px) scale(1.05); transition: opacity 2s ease, transform 2s ease; }

        /* --- NEXT BUTTON --- */
        #nextChapterBtn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 20;
            background: rgba(255, 215, 0, 0.1); border: 1px solid rgba(255, 215, 0, 0.4);
            padding: 15px 35px; border-radius: 40px; color: #ffd700;
            font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: 0.9rem; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer; backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); transition: all 0.5s ease;
            opacity: 0; pointer-events: none;
        }

        #nextChapterBtn.visible { opacity: 1; pointer-events: auto; }
        #nextChapterBtn:active { transform: translateX(-50%) scale(0.95); background: rgba(255, 215, 0, 0.3); }

        /* Fallback Play Button if Audio is Blocked */
        #startAudioBtn {
            position: absolute; z-index: 50; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: none; border: 2px solid #ffd700; color: #ffd700;
            padding: 15px 30px; font-family: 'Montserrat', sans-serif; letter-spacing: 2px;
            border-radius: 30px; cursor: pointer; display: none; backdrop-filter: blur(5px);
        }

    </style>
</head>
<body>

    <!-- Background Images -->
    <div id="bg-container">
        <div class="bg-slide" id="slide1" style="background-image: url('15segment1.jpg');"></div>
        <div class="bg-slide" id="slide2" style="background-image: url('15segment2.jpg');"></div>
    </div>

    <!-- Dark Magical Overlay -->
    <div id="overlay"></div>

    <!-- Floating Lights Canvas -->
    <canvas id="magicCanvas"></canvas>

    <!-- Text Injection Point -->
    <div id="text-container">
        <!-- Messages will be generated by JS -->
    </div>

    <!-- Hidden audio button in case browser blocks auto-play across pages -->
    <button id="startAudioBtn" onclick="forcePlayAudio()">Touch to feel my heart</button>

    <!-- Next Chapter Button -->
    <button id="nextChapterBtn" onclick="bridgeToNextSegment()">Our Journey Continues ➔</button>

    <script>
        // --- AUDIO CONTINUATION LOGIC ---
        const audio = new Audio('music14.mp3'); // Same music file
        audio.loop = true;

        window.addEventListener('DOMContentLoaded', () => {
            const savedTime = localStorage.getItem('tangledAudioTime');
            if (savedTime) {
                audio.currentTime = parseFloat(savedTime);
            }
            
            // Try to play immediately. If blocked, show the fallback button.
            audio.play().then(() => {
                startCinematicExperience();
            }).catch(e => {
                console.log("Auto-play blocked by browser. Showing start button.");
                document.getElementById('startAudioBtn').style.display = 'block';
            });
        });

        function forcePlayAudio() {
            document.getElementById('startAudioBtn').style.display = 'none';
            audio.play();
            startCinematicExperience();
        }

        // --- BACKGROUND IMAGE SWAPPER ---
        const slide1 = document.getElementById('slide1');
        const slide2 = document.getElementById('slide2');
        let currentSlide = 1;

        function swapBackground() {
            if (currentSlide === 1) {
                slide1.classList.remove('active');
                slide2.classList.add('active');
                currentSlide = 2;
            } else {
                slide2.classList.remove('active');
                
                // Reset slide 1 animation by triggering reflow
                void slide1.offsetWidth; 
                
                slide1.classList.add('active');
                currentSlide = 1;
            }
        }

        // --- CINEMATIC TEXT SEQUENCE ---
        const messages = [
            "Before I met you, my world was like a quiet tower...",
            "Safe, but waiting for a light I couldn't understand.",
            "Then you smiled... and suddenly, all the lanterns lit up my sky.",
            "Every moment with you feels like finding a new dream.",
            "You aren't just my Rapunzel...",
            "You are my forever."
        ];

        const textContainer = document.getElementById('text-container');
        let msgIndex = 0;

        function startCinematicExperience() {
            slide1.classList.add('active');
            
            // Swap background every 7 seconds
            setInterval(swapBackground, 7000); 

            // Start showing text
            setTimeout(showNextMessage, 1000);
        }

        function showNextMessage() {
            if (msgIndex >= messages.length) {
                // Show next button when all texts are done
                document.getElementById('nextChapterBtn').classList.add('visible');
                return;
            }

            const textEl = document.createElement('div');
            textEl.className = 'emotional-message';
            textEl.innerText = messages[msgIndex];
            textContainer.appendChild(textEl);

            // Fade In
            setTimeout(() => {
                textEl.classList.add('visible');
            }, 100);

            // Wait, then Fade Out
            setTimeout(() => {
                textEl.classList.remove('visible');
                textEl.classList.add('exit');
                
                // Remove from DOM after fade out
                setTimeout(() => textEl.remove(), 2000);
                
                msgIndex++;
                showNextMessage(); // Loop to next text
            }, 4500); // How long each text stays on screen (4.5 seconds)
        }

        function bridgeToNextSegment() {
            localStorage.setItem('tangledAudioTime', audio.currentTime);
            window.location.href = 'segment16.html'; // Or whatever your next file is
        }

        // --- MAGICAL CANVAS (SOFTER GLOWS FOR THIS SEGMENT) ---
        const canvas = document.getElementById('magicCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function resizeCanvas() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        class Sparkle {
            constructor() { this.reset(); this.y = Math.random() * height; }
            reset() {
                this.x = Math.random() * width; this.y = height + 20 + Math.random() * 50;
                this.size = Math.random() * 2.5 + 0.5;
                this.speedY = Math.random() * 0.6 + 0.2;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.6 + 0.2;
                this.sway = Math.random() * Math.PI * 2; this.swaySpeed = Math.random() * 0.015 + 0.005;
            }
            update() {
                this.y -= this.speedY; this.sway += this.swaySpeed; this.x += Math.sin(this.sway) * 0.5 + this.speedX;
                if (this.y < -30) this.reset();
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.opacity;
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 4);
                grad.addColorStop(0, 'rgba(255, 235, 133, 0.8)'); grad.addColorStop(0.4, 'rgba(212, 175, 55, 0.4)'); grad.addColorStop(1, 'rgba(255, 100, 0, 0)');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }
        for (let i = 0; i < 40; i++) particles.push(new Sparkle());
        function animate() { ctx.clearRect(0, 0, width, height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
