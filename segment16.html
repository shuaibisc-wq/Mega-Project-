<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Sky of 18</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Great+Vibes&family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            width: 100%; 
            min-height: 100vh;
            background: #020106;
            font-family: 'Montserrat', sans-serif;
            /* Scroll enable kora holo choto screen er jonne */
            overflow-x: hidden; 
            overflow-y: auto; 
            touch-action: manipulation;
        }

        /* --- CLASSY BACKGROUND WITH DEEP VIGNETTE --- */
        #bg-image {
            position: fixed; /* Fixed kore deya holo jate scroll korle background theek thake */
            top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background: url('16segment1.jpg') no-repeat center center/cover;
            opacity: 0.35;
            filter: brightness(0.7) contrast(1.1);
        }
        #bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background: radial-gradient(circle at center, transparent 20%, #020106 100%);
        }

        /* --- CANVAS FOR STAR DRONE SHOW --- */
        #starCanvas { 
            position: fixed; /* Canvas fixed thakbe jate stars gulo screen e thake */
            top: 0; left: 0; width: 100%; height: 100%; z-index: 3; pointer-events: none; 
        }

        /* --- EXPLICIT INSTRUCTION TEXT --- */
        #hint-text {
            position: fixed; top: 15%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Montserrat', sans-serif; font-size: 1.1rem; font-weight: 400;
            color: #ffffff; text-align: center; width: 90%; z-index: 10;
            letter-spacing: 3px; text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            transition: opacity 1s ease;
        }
        .highlight { font-family: 'Great Vibes', cursive; font-size: 2.6rem; color: #ffd700; text-transform: none; display: block; margin-top: 5px; text-shadow: 0 0 20px #ff9e00; }

        /* --- LANTERN WRAPPER FOR SMOOTH VERTICAL FLIGHT --- */
        .lantern-wrapper {
            position: fixed; /* absolute theke fixed kora holo jate scroll obosthay theek jaygay spawn hoy */
            z-index: 5; pointer-events: none;
            animation: floatUpSlow 16s linear forwards;
        }

        /* --- REALISTIC CSS LANTERN BODY --- */
        .lantern {
            width: 40px; height: 56px;
            background: linear-gradient(to bottom, #ffea8c 0%, #ffb347 65%, #ff6a00 100%);
            border-radius: 14px 14px 10px 10px;
            box-shadow: 0 0 30px #ffb347, 0 0 60px #ff9e00, inset 0 -8px 20px rgba(230, 50, 0, 0.5);
            transform-origin: bottom center;
            animation: sway 4s ease-in-out infinite alternate;
        }
        .lantern::after {
            content: ''; position: absolute; bottom: -2px; left: 10%; width: 80%; height: 4px;
            background: #4a2303; border-radius: 2px;
        }
        .lantern::before {
            content: ''; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            width: 14px; height: 20px; background: #ffffff; border-radius: 50%;
            box-shadow: 0 0 12px #fff, 0 0 24px #ffea8c;
            animation: flicker 0.15s infinite alternate;
        }

        @keyframes floatUpSlow {
            0% { transform: scale(0.8) translateY(0); opacity: 0; }
            5% { opacity: 1; }
            90% { opacity: 0.8; }
            100% { transform: scale(0.3) translateY(-120vh); opacity: 0; }
        }
        @keyframes sway {
            0% { transform: rotate(-5deg) translateX(-10px); }
            100% { transform: rotate(5deg) translateX(10px); }
        }
        @keyframes flicker {
            0% { opacity: 0.8; transform: translateX(-50%) scale(0.95); }
            100% { opacity: 1; transform: translateX(-50%) scale(1.05); }
        }

        /* --- FINAL BIRTHDAY WISH CARD --- */
        #message-container {
            position: absolute; top: 75%; left: 50%; transform: translate(-50%, 30px);
            z-index: 20; text-align: center; width: 85%; max-width: 450px;
            opacity: 0; pointer-events: none; transition: all 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(12, 6, 22, 0.55); padding: 35px 25px;
            border-radius: 20px; border: 1px solid rgba(255, 215, 0, 0.25);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9); backdrop-filter: blur(12px);
            margin-bottom: 50px; /* Scroll korle niche gap thakar jonne */
        }
        #message-container.revealed { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }

        .reveal-title { font-family: 'Cinzel Decorative', serif; font-size: 2.2rem; color: #ffd700; margin-bottom: 12px; text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
        .romantic-note { font-family: 'Great Vibes', cursive; color: #e0e0e0; font-size: 2rem; margin-bottom: 25px; }

        #nextChapterBtn {
            background: transparent; border: 1px solid #ffd700; color: #ffd700; padding: 14px 35px;
            border-radius: 35px; font-family: 'Montserrat', sans-serif; font-size: 0.9rem; letter-spacing: 2px;
            text-transform: uppercase; cursor: pointer; transition: 0.4s;
        }
        #nextChapterBtn:hover { background: rgba(255, 215, 0, 0.15); box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }

        /* --- RESPONSIVE FIX FOR SMALLER SCREENS --- */
        @media(max-height: 750px) {
            #hint-text { top: 12%; font-size: 0.9rem; }
            .highlight { font-size: 2.1rem; }
            
            #message-container {
                top: 60%; /* Card ta ektu upore uthiye deya holo */
                padding: 25px 20px;
            }
            .reveal-title { font-size: 1.8rem; margin-bottom: 8px; }
            .romantic-note { font-size: 1.6rem; margin-bottom: 18px; }
            #nextChapterBtn { padding: 12px 25px; font-size: 0.8rem; }
        }

        @media(max-width: 600px) {
            #hint-text { font-size: 0.9rem; }
            .highlight { font-size: 2.1rem; }
        }
    </style>
</head>
<body>

    <div id="bg-image"></div>
    <div id="bg-gradient"></div>

    <div id="hint-text">
        Tap the night sky
        <span class="highlight">to release 9 magical lanterns...</span>
    </div>

    <canvas id="starCanvas"></canvas>

    <div id="message-container">
        <div class="reveal-title">Happy 18th Birthday, Prova!</div>
        <div class="romantic-note">The stars aligned just for you.</div>
        <button id="nextChapterBtn" onclick="bridgeToNextSegment()">Next Chapter ➔</button>
    </div>

    <script>
        // --- AUDIO SYSTEM ---
        const audio = new Audio('music14.mp3');
        audio.loop = true;
        window.addEventListener('DOMContentLoaded', () => {
            const savedTime = localStorage.getItem('tangledAudioTime');
            if (savedTime) audio.currentTime = parseFloat(savedTime);
        });

        // --- CANVAS PARTICLE ENGINE (THE DRONE SHOW) ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let particles = [];
        let textTargets = [];
        let isDroneShowActive = false;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            if(!isDroneShowActive) createAmbientStars();
        });

        class Particle {
            constructor(x, y, isMagicParticle = false) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * (isMagicParticle ? 6 : 0.4);
                this.vy = (Math.random() - 0.5) * (isMagicParticle ? 6 : 0.4);
                this.size = isMagicParticle ? Math.random() * 2 + 1 : Math.random() * 1.5 + 0.5;
                this.color = Math.random() > 0.3 ? '#ffd700' : '#ffffff'; 
                this.targetX = null; this.targetY = null;
                this.friction = 0.96;
            }
            update() {
                if (isDroneShowActive && this.targetX !== null) {
                    let dx = this.targetX - this.x;
                    let dy = this.targetY - this.y;
                    this.x += dx * 0.04; 
                    this.y += dy * 0.04;
                } else {
                    this.x += this.vx; this.y += this.vy;
                    this.vx *= this.friction; this.vy *= this.friction;
                    if(this.x < 0 || this.x > width) this.vx *= -1;
                    if(this.y < 0 || this.y > height) this.vy *= -1;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = isDroneShowActive ? 8 : 4;
                ctx.shadowColor = this.color;
                ctx.fill();
            }
        }

        function createAmbientStars() {
            particles = [];
            for (let i = 0; i < 400; i++) {
                particles.push(new Particle(Math.random() * width, Math.random() * height, false));
            }
        }
        createAmbientStars();

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // --- INTERACTION LOGIC ---
        let tapCount = 0;
        const TARGET_LANTERNS = 9;

        document.addEventListener('pointerdown', (e) => {
            if (isDroneShowActive || e.target.closest('#message-container')) return;

            if (audio.paused) audio.play();

            tapCount++;

            const wrapper = document.createElement('div');
            wrapper.className = 'lantern-wrapper';
            wrapper.style.left = (e.clientX - 20) + 'px';
            wrapper.style.top = (e.clientY - 28) + 'px';

            const lantern = document.createElement('div');
            lantern.className = 'lantern';

            wrapper.appendChild(lantern);
            document.body.appendChild(wrapper);

            for(let i = 0; i < 15; i++) {
                particles.push(new Particle(e.clientX, e.clientY, true));
            }

            const hint = document.getElementById('hint-text');
            if (tapCount < TARGET_LANTERNS) {
                hint.innerHTML = `Lanterns Released: <span class="highlight" style="font-size:2rem; display:inline;">${tapCount} / 9</span>`;
            }

            if (tapCount === TARGET_LANTERNS) {
                hint.style.opacity = '0';
                isDroneShowActive = true;

                setTimeout(triggerDroneShow, 1200);
            }
        });

        function triggerDroneShow() {
            const offCanvas = document.createElement('canvas');
            const offCtx = offCanvas.getContext('2d');
            offCanvas.width = width; offCanvas.height = height;

            let isMobile = width < 600;
            let dateSize = isMobile ? width * 0.12 : 65;
            let ageSize = isMobile ? width * 0.22 : 120;

            offCtx.fillStyle = "white";
            offCtx.textAlign = "center";
            offCtx.textBaseline = "middle";

            offCtx.font = `900 ${dateSize}px 'Montserrat'`;
            offCtx.fillText("JUNE 9", width / 2, height * 0.35);

            offCtx.font = `700 ${ageSize}px 'Cinzel Decorative'`;
            offCtx.fillText("18", width / 2, height * 0.50);

            const imgData = offCtx.getImageData(0, 0, width, height).data;

            const step = isMobile ? 3 : 4; 
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    const alpha = imgData[(y * width + x) * 4 + 3];
                    if (alpha > 128) { 
                        textTargets.push({ x: x, y: y });
                    }
                }
            }

            for (let i = 0; i < textTargets.length; i++) {
                if (i >= particles.length) {
                    particles.push(new Particle(Math.random() * width, Math.random() > 0.5 ? -20 : height + 20, true));
                }
                particles[i].targetX = textTargets[i].x;
                particles[i].targetY = textTargets[i].y;
            }

            setTimeout(() => {
                document.getElementById('message-container').classList.add('revealed');
            }, 3000);
        }

        function bridgeToNextSegment() {
            localStorage.setItem('tangledAudioTime', audio.currentTime);
            window.location.href = 'segment17.html';
        }
    </script>
</body>
</html>
