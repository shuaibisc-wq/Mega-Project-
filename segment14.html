<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Rapunzel's Exhibition</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Great+Vibes&family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            width: 100%; height: 100%;
            background: #04010a; 
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            overflow: hidden; 
        }

        /* --- BACKGROUND AURA & CANVAS (UPDATED FOR VISIBLE RAPUNZEL) --- */
        #rapunzelAura {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            /* Ebar mask use korechi jate majhkhaner frame er jaygata ektu dark thake kintu pashe Rapunzel ke clear dekha jay */
            background-image: 
                radial-gradient(ellipse at center, rgba(4, 1, 10, 0.7) 10%, rgba(147, 83, 211, 0.2) 60%, rgba(4, 1, 10, 0.4) 100%), 
                url('rapunzel.jpg'); 
            background-size: cover; 
            background-position: center;
            opacity: 0.65; /* Opacity bariyelchi 0.25 theke 0.65 */
            z-index: 1; 
            pointer-events: none; 
            mix-blend-mode: lighten; /* 'screen' er bodole 'lighten' better visibility dey dark mode e */
            filter: blur(1.5px); /* Blur kumiyechi jate details bujha jay */
            animation: slowBreathe 8s infinite alternate ease-in-out;
        }

        @keyframes slowBreathe {
            0% { opacity: 0.5; filter: blur(2px) brightness(0.9); transform: scale(1); }
            100% { opacity: 0.75; filter: blur(1px) brightness(1.1); transform: scale(1.02); }
        }

        #magicCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        /* --- MAGIC GATE (COVER) --- */
        #magicCover {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b0c2a 0%, #04010a 100%);
            z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            transition: opacity 2s ease, visibility 2s; padding: 20px;
        }
        .cover-title { font-family: 'Cinzel Decorative', serif; font-size: 2.8rem; color: #fdf5e6; text-shadow: 0 0 25px rgba(255, 215, 0, 0.8); margin-bottom: 10px; line-height: 1.2; }
        .cover-subtitle { font-family: 'Great Vibes', cursive; font-size: 2.5rem; color: #ffb8d1; margin-bottom: 40px; text-shadow: 0 0 15px rgba(255, 184, 209, 0.6); }
        .enter-btn { background: rgba(255, 215, 0, 0.05); border: 1px solid rgba(255, 215, 0, 0.4); padding: 16px 40px; border-radius: 40px; color: #ffd700; font-family: 'Montserrat', sans-serif; font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; backdrop-filter: blur(5px); box-shadow: 0 0 20px rgba(255, 215, 0, 0.15); transition: 0.4s; }
        .enter-btn:active { transform: scale(0.95); }

        /* --- SLIDESHOW CONTAINER --- */
        #slideshowContainer {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 2s ease; padding: 20px;
            /* Container eo ekta halka dark fade rekhechi jate text portei shubidha hoy */
            background: radial-gradient(circle at center, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
        }

        .magical-frame {
            position: relative; width: 85vw; max-width: 380px; aspect-ratio: 4/5;
            border-radius: 12px; padding: 8px; 
            background: rgba(20, 10, 30, 0.6); /* Slightly darker frame bg for contrast */
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.2); /* Stronger dark shadow behind frame */
            opacity: 0; transform: scale(0.95); transition: opacity 1s ease, transform 1s ease;
            display: none; 
        }
        .magical-frame.active { display: block; opacity: 1; transform: scale(1); }

        .magical-frame::before, .magical-frame::after {
            content: ''; position: absolute; width: 40px; height: 40px; border: 2px solid #ffd700; opacity: 0.8; pointer-events: none;
        }
        .magical-frame::before { top: -5px; left: -5px; border-right: none; border-bottom: none; border-top-left-radius: 12px; }
        .magical-frame::after { bottom: -5px; right: -5px; border-left: none; border-top: none; border-bottom-right-radius: 12px; }

        .photo-inner { width: 100%; height: 100%; border-radius: 8px; overflow: hidden; position: relative; }
        .photo-inner img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.95); animation: slowZoom 15s infinite alternate ease-in-out; }
        @keyframes slowZoom { from { transform: scale(1); } to { transform: scale(1.08); } }

        /* TEXT AND CONTROLS */
        .caption-text {
            font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.7rem; color: #fff5ee;
            text-align: center; text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9), 0 0 15px rgba(255, 215, 0, 0.4); /* Stronger text shadow for readability */
            margin-top: 30px; line-height: 1.3; min-height: 80px;
            opacity: 0; transform: translateY(10px); transition: opacity 1s ease, transform 1s ease;
            z-index: 15;
        }
        .caption-text.active { opacity: 1; transform: translateY(0); }

        .controls {
            display: flex; justify-content: space-between; align-items: center;
            width: 85vw; max-width: 380px; margin-top: 20px; z-index: 15;
            background: rgba(0,0,0,0.3); /* Subtle dark bar for controls */
            padding: 5px 15px; border-radius: 30px;
        }
        
        .nav-btn {
            background: none; border: none; color: #ffd700; font-family: 'Montserrat', sans-serif; font-size: 1rem;
            letter-spacing: 2px; text-transform: uppercase; cursor: pointer; text-shadow: 1px 1px 5px rgba(0,0,0,0.8);
            padding: 10px; transition: 0.3s;
        }
        .nav-btn:active { transform: scale(0.9); }
        .nav-btn.disabled { opacity: 0.3; pointer-events: none; }

        /* FINAL BUTTON */
        #finalBtn {
            background: linear-gradient(45deg, #d4af37, #ffeb85); border: none; padding: 15px 30px; border-radius: 40px; color: #04010a;
            font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.9rem; letter-spacing: 1px; cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4); display: none; margin-top: 15px; animation: fadeIn 1s ease; z-index: 15;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    </style>
</head>
<body>

    <div id="rapunzelAura"></div>
    <canvas id="magicCanvas"></canvas>

    <div id="magicCover">
        <h1 class="cover-title">At Last I See The Light</h1>
        <h2 class="cover-subtitle">To My Rapunzel...</h2>
        <button class="enter-btn" onclick="startExperience()">Unlock Our Magic</button>
    </div>

    <div id="slideshowContainer">
        <div id="frameContainer"></div>
        <div id="captionDisplay" class="caption-text"></div>

        <div class="controls" id="navControls">
            <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)">❮ Prev</button>
            <span style="font-family: 'Great Vibes'; color: #ffb8d1; font-size: 1.5rem;" id="counterDisplay">1/7</span>
            <button class="nav-btn" id="nextBtn" onclick="changeSlide(1)">Next ❯</button>
        </div>

        <button id="finalBtn" onclick="bridgeToNextSegment()">Walk to the next chapter ➔</button>
    </div>

    <script>
        // --- DATA ---
        const galleryData = [
            { img: "prova1.jpg", caption: "Every time you smile, my whole world lights up." },
            { img: "prova2.jpg", caption: "You are the magic I never knew I was searching for." },
            { img: "prova3.jpg", caption: "In a kingdom full of stars, you are the only one I see." },
            { img: "prova4.jpg", caption: "With you, every single moment feels like a fairytale." },
            { img: "prova5.jpg", caption: "My very own Rapunzel, prettier than any dream." },
            { img: "prova6.jpg", caption: "I'd cross a thousand kingdoms just to see you smile." },
            { img: "prova7.jpg", caption: "And at last I see the light... because of you." }
        ];

        let currentIndex = 0;
        const frameContainer = document.getElementById('frameContainer');
        const captionDisplay = document.getElementById('captionDisplay');
        const counterDisplay = document.getElementById('counterDisplay');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const finalBtn = document.getElementById('finalBtn');

        // --- AUDIO SETUP ---
        const audio = new Audio('music14.mp3');
        audio.loop = true;
        
        // 🔥 Gaaner vocal start hoyar exact second (15s) 🔥
        const singingStartTime = 15; 

        function startExperience() {
            // Start audio precisely when the singing begins
            audio.currentTime = singingStartTime;
            audio.play().catch(e => console.log("Audio failed:", e));

            document.getElementById('magicCover').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('magicCover').style.display = 'none';
                const container = document.getElementById('slideshowContainer');
                container.style.display = 'flex';
                setTimeout(() => container.style.opacity = '1', 100);
                
                initSlideshow();
            }, 2000);
        }

        function initSlideshow() {
            galleryData.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = `magical-frame ${i === 0 ? 'active' : ''}`;
                div.id = `slide-${i}`;
                div.innerHTML = `<div class="photo-inner"><img src="${item.img}" alt="Prova"></div>`;
                frameContainer.appendChild(div);
            });
            updateUI();
        }

        function changeSlide(direction) {
            const oldSlide = document.getElementById(`slide-${currentIndex}`);
            oldSlide.classList.remove('active');
            captionDisplay.classList.remove('active');

            currentIndex += direction;

            setTimeout(() => {
                const newSlide = document.getElementById(`slide-${currentIndex}`);
                newSlide.classList.add('active');
                updateUI();
            }, 500); 
        }

        function updateUI() {
            setTimeout(() => {
                captionDisplay.innerText = `"${galleryData[currentIndex].caption}"`;
                captionDisplay.classList.add('active');
            }, 100);

            counterDisplay.innerText = `${currentIndex + 1} / ${galleryData.length}`;
            
            prevBtn.classList.toggle('disabled', currentIndex === 0);
            
            if (currentIndex === galleryData.length - 1) {
                nextBtn.style.display = 'none';
                finalBtn.style.display = 'block'; 
            } else {
                nextBtn.style.display = 'block';
                finalBtn.style.display = 'none';
            }
        }

        function bridgeToNextSegment() {
            localStorage.setItem('tangledAudioTime', audio.currentTime);
            window.location.href = 'segment15.html';
        }

        // --- CANVAS (LANTERNS & STARDUST) ---
        const canvas = document.getElementById('magicCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function resizeCanvas() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        class Particle {
            constructor(isLantern) { this.isLantern = isLantern; this.reset(); this.y = Math.random() * height; }
            reset() {
                this.x = Math.random() * width; this.y = height + 20 + Math.random() * 50;
                this.size = this.isLantern ? Math.random() * 4 + 3 : Math.random() * 1.5 + 0.5;
                this.speedY = this.isLantern ? Math.random() * 0.8 + 0.3 : Math.random() * 0.5 + 0.2;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.opacity = this.isLantern ? Math.random() * 0.5 + 0.3 : Math.random() * 0.8 + 0.2;
                this.sway = Math.random() * Math.PI * 2; this.swaySpeed = Math.random() * 0.02 + 0.01;
            }
            update() {
                this.y -= this.speedY; this.sway += this.swaySpeed; this.x += Math.sin(this.sway) * 0.5 + this.speedX;
                if (this.y < -30) this.reset();
            }
            draw() {
                ctx.save(); ctx.globalAlpha = this.opacity;
                if (this.isLantern) {
                    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3.5);
                    grad.addColorStop(0, 'rgba(255, 235, 133, 0.9)'); grad.addColorStop(0.3, 'rgba(255, 160, 50, 0.5)'); grad.addColorStop(1, 'rgba(255, 100, 0, 0)');
                    ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 3.5, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#ffebb3'; ctx.fillRect(this.x - this.size/2, this.y - this.size, this.size, this.size * 1.8);
                } else {
                    ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                }
                ctx.restore();
            }
        }
        for (let i = 0; i < 25; i++) particles.push(new Particle(true));
        for (let i = 0; i < 50; i++) particles.push(new Particle(false));
        function animate() { ctx.clearRect(0, 0, width, height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
        animate();
    </script>
</body>
</html>
