<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Segment 10 - High-End Dynamic Chocolate Box</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #090301;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Continuous High-Density Fusion Background Engine */
        #hyper-dynamic-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .container {
            width: 100%;
            max-width: 380px; /* Samsung A06 Viewport Edge Lock Frame */
            padding: 20px;
            text-align: center;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #f5e6ca;
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8), 0 0 20px rgba(245, 230, 202, 0.2);
        }

        p.subtitle {
            color: #cca48f;
            font-size: 13px;
            margin-bottom: 25px;
            font-weight: 300;
            text-shadow: 0 2px 5px rgba(0,0,0,0.7);
        }

        /* Glassmorphic Luxury Box Container Matrix */
        .chocolate-box {
            background: rgba(20, 9, 4, 0.35);
            border-radius: 24px;
            padding: 22px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.08);
            display: grid;
            grid-template-columns: repeat(2, 125px);
            gap: 20px;
            justify-content: center;
            margin-bottom: 35px;
        }

        .chocolate-card {
            background: linear-gradient(145deg, #2c1308, #130703);
            height: 125px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        box-shadow 0.4s ease, border-color 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.01);
            box-shadow: 5px 8px 22px rgba(0,0,0,0.5);
        }

        .chocolate-card:active {
            transform: scale(0.93);
        }

        .choco-icon {
            font-size: 42px;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.6));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .choco-name {
            color: #e6dacb;
            font-size: 11px;
            margin-top: 10px;
            font-weight: 500;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        /* Unwrapped Cinematic Glow State */
        .chocolate-card.unwrapped {
            background: linear-gradient(145deg, #6c3417, #2b1206);
            border-color: #f5e6ca;
            box-shadow: 0 0 25px rgba(245, 230, 202, 0.35);
        }

        .chocolate-card.unwrapped .choco-icon {
            transform: scale(1.25) rotate(12deg);
        }

        /* Premium Custom Glass Message PopUp Frame Setup */
        .message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 2, 1, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .message-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .message-card {
            background: linear-gradient(135deg, #220f06, #0a0301);
            padding: 30px 25px;
            border-radius: 24px;
            width: 85%;
            max-width: 310px;
            text-align: center;
            border: 1px solid rgba(245, 230, 202, 0.2);
            box-shadow: 0 35px 70px rgba(0,0,0,0.85);
            transform: translateY(40px) scale(0.85);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .message-overlay.active .message-card {
            transform: translateY(0) scale(1);
        }

        .message-card h3 {
            color: #f5e6ca;
            font-size: 19px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .message-card p {
            color: #d6c7be;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 24px;
            font-weight: 300;
        }

        .close-btn {
            background: linear-gradient(45deg, #e6b980, #eacda3);
            color: #220f06;
            border: none;
            padding: 11px 30px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.5px;
            box-shadow: 0 5px 15px rgba(230, 185, 128, 0.4);
            transition: transform 0.2s;
        }

        .close-btn:active {
            transform: scale(0.96);
        }

        /* Romantic and Mysterious Dynamic Link Trigger */
        .nav-btn {
            display: inline-block;
            background: linear-gradient(45deg, #5c0717, #240107);
            color: #fceade;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            border: 1px solid rgba(245, 230, 202, 0.15);
            box-shadow: 0 8px 32px rgba(92, 7, 23, 0.6),
                        inset 0 1px 1px rgba(255,255,255,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .nav-btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <canvas id="hyper-dynamic-canvas"></canvas>

    <audio id="bg-music" loop>
        <source src="music7.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>Chocolate Box for Prova 🍫</h1>
        <p class="subtitle">Tap the boxes to unwrap premium treats!</p>

        <div class="chocolate-box">
            <div class="chocolate-card" onclick="unwrapChocolate(this, 'Dark Chocolate 🖤', 'You are deeper and more beautiful than the finest Dark Chocolate, Prova!')">
                <div class="choco-icon">🍫</div>
                <div class="choco-name">Dark Chocolate</div>
            </div>
            <div class="chocolate-card" onclick="unwrapChocolate(this, 'Caramel Truffle 🍯', 'You are sweeter than this golden Caramel Truffle, Prova! 💖')">
                <div class="choco-icon">🍬</div>
                <div class="choco-name">Caramel Truffle</div>
            </div>
            <div class="chocolate-card" onclick="unwrapChocolate(this, 'Strawberry Silk 🍓', 'Every moment with you feels as premium and smooth as Strawberry Silk!')">
                <div class="choco-icon">💝</div>
                <div class="choco-name">Strawberry Silk</div>
            </div>
            <div class="chocolate-card" onclick="unwrapChocolate(this, 'White Almond 🤍', 'Pure, rare, and unique—just like the best White Almond block!')">
                <div class="choco-icon">🍪</div>
                <div class="choco-name">White Almond</div>
            </div>
        </div>

        <a href="segment11.html" class="nav-btn" onclick="saveAudioState()">A Mysterious Symphony Awaits... 🎵</a>
    </div>

    <div class="message-overlay" id="msgOverlay">
        <div class="message-card">
            <h3 id="msgTitle">Title</h3>
            <p id="msgText">Message</p>
            <button class="close-btn" onclick="closePopup()">Aww! 💕</button>
        </div>
    </div>

    <script>
        // --- 1. CONTINUOUS TRACK INTEGRATION ENGINE ---
        const audio = document.getElementById('bg-music');

        window.addEventListener('DOMContentLoaded', () => {
            const savedTime = localStorage.getItem('music_time');
            const isPaused = localStorage.getItem('music_paused');

            if (savedTime !== null) {
                audio.currentTime = parseFloat(savedTime);
            }

            if (isPaused !== 'true') {
                const playAudio = () => {
                    audio.play().catch(err => {
                        console.log("Audio lock framework waiting engine interact call sequence...", err);
                    });
                };
                playAudio();
                window.addEventListener('click', playAudio, { once: true });
                window.addEventListener('touchstart', playAudio, { once: true });
            }
        });

        setInterval(() => {
            if (!audio.paused) {
                localStorage.setItem('music_time', audio.currentTime);
                localStorage.setItem('music_paused', 'false');
            }
        }, 300);

        function saveAudioState() {
            localStorage.setItem('music_time', audio.currentTime);
            localStorage.setItem('music_paused', audio.paused ? 'true' : 'false');
        }


        // --- 2. MULTI-LAYER FUSION CANVAS ENGINE (ALIVE BACKGROUND) ---
        const canvas = document.getElementById('hyper-dynamic-canvas');
        const ctx = canvas.getContext('2d');

        let interactionParticles = [];
        let ambientStars = [];
        const emojis = ['🍫', '🍬', '❤️', '💝', '✨', '🍪'];
        let waveTime = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Initialize Ambient Background Glowing Float Stars Data Base Matrix
        function initAmbientStars() {
            ambientStars = [];
            const count = 35; // Fine high-end dense tracking floaters
            for(let i=0; i<count; i++) {
                ambientStars.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    radius: Math.random() * 1.5 + 0.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005,
                    drift: Math.random() * 0.2 - 0.1
                });
            }
        }
        initAmbientStars();

        class ExplosionParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
                this.size = Math.random() * 16 + 18;
                this.speedX = Math.random() * 8 - 4;
                this.speedY = Math.random() * -12 - 6; // Kinetic launch burst force upwards
                this.gravity = 0.38;
                this.opacity = 1;
                this.spin = Math.random() * 0.1 - 0.05;
                this.angle = Math.random() * Math.PI * 2;
            }

            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.angle += this.spin;
                this.opacity -= 0.012;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.opacity);
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.font = `${this.size}px Arial`;
                ctx.fillText(this.emoji, -this.size/2, this.size/2);
                ctx.restore();
            }
        }

        // Render Completely Alive Organic Morphing Fluids & Aurora Waves
        function renderLivingBackground() {
            waveTime += 0.0025; // Super elegant kinetic pacing velocity configuration

            // Layer Base Frame
            ctx.fillStyle = '#090301';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Layer 1: Luxury Deep Cocoa Aurora Flow
            ctx.fillStyle = 'rgba(44, 19, 8, 0.45)';
            ctx.beginPath();
            ctx.moveTo(0, 0);
            for (let x = 0; x <= canvas.width; x += 15) {
                let y = canvas.height * 0.35 + 
                        Math.sin(x * 0.0025 + waveTime) * 70 + 
                        Math.cos(x * 0.0015 - waveTime * 1.3) * 50;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.closePath();
            ctx.fill();

            // Layer 2: Deep Crimson Velvet Fluid Swell Intersecting Wave
            ctx.fillStyle = 'rgba(64, 8, 19, 0.3)';
            ctx.beginPath();
            ctx.moveTo(0, 0);
            for (let x = 0; x <= canvas.width; x += 15) {
                let y = canvas.height * 0.55 + 
                        Math.cos(x * 0.0035 - waveTime * 1.1) * 80 + 
                        Math.sin(x * 0.001 + waveTime * 1.8) * 40;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(0, canvas.height);
            ctx.closePath();
            ctx.fill();

            // Layer 3: Dynamic Ambient Floating Sparkles Render Loop
            for (let i = 0; i < ambientStars.length; i++) {
                let s = ambientStars[i];
                s.alpha += s.speed;
                s.y -= Math.abs(s.drift) * 2; // Smoothly floats upwards
                s.x += s.drift;

                // Infinite loop wrapping limits
                if (s.alpha > 1 || s.alpha < 0) s.speed = -s.speed;
                if (s.y < 0) { s.y = canvas.height; s.x = Math.random() * canvas.width; }
                if (s.x < 0 || s.x > canvas.width) s.drift = -s.drift;

                ctx.fillStyle = `rgba(245, 230, 202, ${Math.max(0, s.alpha * 0.4)})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function mainLoop() {
            renderLivingBackground();

            // Render interactive user click burst chocolate particles layer
            for (let i = interactionParticles.length - 1; i >= 0; i--) {
                interactionParticles[i].update();
                interactionParticles[i].draw();
                if (interactionParticles[i].opacity <= 0) {
                    interactionParticles.splice(i, 1);
                }
            }
            requestAnimationFrame(mainLoop);
        }
        mainLoop();


        // --- 3. CORE INTERACTIVE UNWRAP LOGIC MATRIX ---
        function unwrapChocolate(element, title, text) {
            element.classList.add('unwrapped');

            const rect = element.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            // Trigger explosive burst particle generation density
            for(let i = 0; i < 30; i++) {
                interactionParticles.push(new ExplosionParticle(startX, startY));
            }

            // Launch glass premium modal card view state
            setTimeout(() => {
                document.getElementById('msgTitle').innerText = title;
                document.getElementById('msgText').innerText = text;
                document.getElementById('msgOverlay').classList.add('active');
            }, 350);
        }

        function closePopup() {
            document.getElementById('msgOverlay').classList.remove('active');
        }
    </script>
</body>
</html>
