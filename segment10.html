<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Segment 10 - High-End Dynamic Chocolate Box</title>
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,600&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* Romantic Starry Night Twilight Background */
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #060100 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Continuous High-Density Fusion Background Engine */
        #hyper-dynamic-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 400px; 
            padding: 20px;
            text-align: center;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            color: #ffd700;
            font-size: 42px;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-shadow: 0 4px 20px rgba(255, 215, 0, 0.6), 0 0 10px rgba(0,0,0,0.8);
            animation: pulseGlow 3s infinite alternate ease-in-out;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); transform: scale(1); }
            100% { text-shadow: 0 4px 25px rgba(255, 215, 0, 0.8); transform: scale(1.02); }
        }

        p.subtitle {
            color: #fce2b8;
            font-size: 14px;
            margin-bottom: 35px;
            font-weight: 300;
            letter-spacing: 1px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.9);
        }

        /* Premium Glass Box */
        .chocolate-box {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 30px;
            padding: 25px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 
                        inset 0 0 20px rgba(255, 215, 0, 0.05);
            display: grid;
            grid-template-columns: repeat(2, 135px);
            gap: 25px;
            justify-content: center;
            margin-bottom: 45px;
        }

        /* --- 3D FLIP CARD ENGINE --- */
        .card-container {
            background: transparent;
            width: 135px;
            height: 135px;
            perspective: 1000px; /* Essential for 3D effect */
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            cursor: pointer;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        /* Front - Wrapped Chocolate */
        .card-front {
            background: linear-gradient(135deg, #4a1f0d, #1a0802);
            box-shadow: inset 0 0 15px rgba(255, 215, 0, 0.1);
        }

        .card-front::before {
            content: 'Tap to Unwrap';
            position: absolute;
            bottom: 10px;
            font-size: 9px;
            color: #d49a5b;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .front-icon { font-size: 45px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8)); }

        /* Back - Unwrapped Premium State */
        .card-back {
            background: linear-gradient(145deg, #1f0b04, #3d1405);
            transform: rotateY(180deg);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3), inset 0 0 20px rgba(255,255,255,0.1);
            border-color: #ffdca8;
        }

        .back-icon { 
            font-size: 55px; 
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8));
            transform: rotate(15deg);
        }

        .choco-name {
            color: #f7e7d2;
            font-size: 11px;
            margin-top: 10px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Message PopUp Frame */
        .message-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: center;
            z-index: 10; opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .message-overlay.active { opacity: 1; pointer-events: auto; }

        .message-card {
            background: linear-gradient(135deg, rgba(45, 15, 8, 0.95), rgba(15, 5, 2, 0.98));
            padding: 35px 25px;
            border-radius: 24px;
            width: 85%; max-width: 320px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 40px 80px rgba(0,0,0,0.9), 0 0 40px rgba(212, 154, 91, 0.3);
            transform: translateY(50px) scale(0.9);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .message-overlay.active .message-card { transform: translateY(0) scale(1); }

        .message-card h3 {
            font-family: 'Playfair Display', serif;
            color: #ffdca8; font-size: 22px; margin-bottom: 15px; font-weight: 600;
        }

        .message-card p {
            color: #e5d1c5; font-size: 14px; line-height: 1.6; margin-bottom: 25px; font-weight: 300;
        }

        .close-btn {
            background: linear-gradient(45deg, #d49a5b, #fce2b8);
            color: #2b1104; border: none; padding: 12px 35px;
            border-radius: 30px; font-weight: 600; cursor: pointer;
            font-size: 14px; letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(212, 154, 91, 0.4);
            transition: transform 0.2s;
        }
        .close-btn:active { transform: scale(0.92); }

        /* Navigation Button */
        .nav-btn {
            display: inline-block;
            background: linear-gradient(45deg, #ff0055, #6b0024);
            color: #fff; text-decoration: none;
            padding: 16px 36px; border-radius: 35px;
            font-weight: 500; font-size: 13px; letter-spacing: 1.5px;
            text-transform: uppercase; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(255, 0, 85, 0.5);
            transition: all 0.3s ease; animation: navPulse 2s infinite;
        }

        @keyframes navPulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 85, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(255, 0, 85, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 85, 0); }
        }
    </style>
</head>
<body>

    <canvas id="hyper-dynamic-canvas"></canvas>

    <audio id="bg-music" loop>
        <source src="music7.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>For You, Prova</h1>
        <p class="subtitle">Tap the boxes to unwrap your magic</p>

        <div class="chocolate-box">
            <!-- 3D FLIP CARD 1 -->
            <div class="card-container" onclick="unwrapChocolate(this, 'Dark Chocolate 🖤', 'You are deeper and more beautiful than the finest Dark Chocolate, Prova!')">
                <div class="card-inner">
                    <div class="card-front"><div class="front-icon">🎁</div></div>
                    <div class="card-back">
                        <div class="back-icon">🍫</div>
                        <div class="choco-name">Dark Choco</div>
                    </div>
                </div>
            </div>

            <!-- 3D FLIP CARD 2 -->
            <div class="card-container" onclick="unwrapChocolate(this, 'Caramel Truffle 🍯', 'You are sweeter than this golden Caramel Truffle, Prova! 💖')">
                <div class="card-inner">
                    <div class="card-front"><div class="front-icon">🎁</div></div>
                    <div class="card-back">
                        <div class="back-icon">🍬</div>
                        <div class="choco-name">Caramel Truffle</div>
                    </div>
                </div>
            </div>

            <!-- 3D FLIP CARD 3 -->
            <div class="card-container" onclick="unwrapChocolate(this, 'Strawberry Silk 🍓', 'Every moment with you feels as premium and smooth as Strawberry Silk!')">
                <div class="card-inner">
                    <div class="card-front"><div class="front-icon">🎁</div></div>
                    <div class="card-back">
                        <div class="back-icon">💝</div>
                        <div class="choco-name">Strawberry Silk</div>
                    </div>
                </div>
            </div>

            <!-- 3D FLIP CARD 4 -->
            <div class="card-container" onclick="unwrapChocolate(this, 'White Almond 🤍', 'Pure, rare, and unique—just like the best White Almond block!')">
                <div class="card-inner">
                    <div class="card-front"><div class="front-icon">🎁</div></div>
                    <div class="card-back">
                        <div class="back-icon">🍪</div>
                        <div class="choco-name">White Almond</div>
                    </div>
                </div>
            </div>
        </div>

        <a href="segment11.html" class="nav-btn" onclick="saveAudioState()">A Mysterious Symphony Awaits... 🎵</a>
    </div>

    <div class="message-overlay" id="msgOverlay">
        <div class="message-card">
            <h3 id="msgTitle">Title</h3>
            <p id="msgText">Message</p>
            <button class="close-btn" onclick="closePopup()">Aww! 💕</button>
        </div>
    </div>

    <script>
        // --- 1. CONTINUOUS TRACK INTEGRATION ENGINE (EXACTLY AS YOU PROVIDED) ---
        const audio = document.getElementById('bg-music');

        window.addEventListener('DOMContentLoaded', () => {
            const savedTime = localStorage.getItem('music_time');
            const isPaused = localStorage.getItem('music_paused');

            if (savedTime !== null) {
                audio.currentTime = parseFloat(savedTime);
            }

            if (isPaused !== 'true') {
                const playAudio = () => {
                    audio.play().catch(err => {
                        console.log("Audio lock framework waiting engine interact call sequence...", err);
                    });
                };
                playAudio();
                window.addEventListener('click', playAudio, { once: true });
                window.addEventListener('touchstart', playAudio, { once: true });
            }
        });

        setInterval(() => {
            if (!audio.paused) {
                localStorage.setItem('music_time', audio.currentTime);
                localStorage.setItem('music_paused', 'false');
            }
        }, 300);

        function saveAudioState() {
            localStorage.setItem('music_time', audio.currentTime);
            localStorage.setItem('music_paused', audio.paused ? 'true' : 'false');
        }


        // --- 2. ROMANTIC STARRY NIGHT CANVAS ENGINE ---
        const canvas = document.getElementById('hyper-dynamic-canvas');
        const ctx = canvas.getContext('2d');
        let interactionParticles = [];
        let stars = [];
        let shootingStars = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function initStars() {
            for(let i=0; i<100; i++) {
                stars.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    r: Math.random() * 1.5, alpha: Math.random(),
                    speed: Math.random() * 0.02 + 0.005
                });
            }
        }
        initStars();

        class Particle {
            constructor(x, y, char) {
                this.x = x; this.y = y; this.char = char;
                this.size = Math.random() * 15 + 15;
                this.speedX = (Math.random() - 0.5) * 10;
                this.speedY = (Math.random() - 1) * 10 - 2;
                this.gravity = 0.4; this.opacity = 1; this.spin = (Math.random()-0.5)*0.2;
                this.angle = 0;
            }
            update() {
                this.speedY += this.gravity; this.x += this.speedX; this.y += this.speedY;
                this.angle += this.spin; this.opacity -= 0.015;
            }
            draw() {
                ctx.save(); ctx.globalAlpha = Math.max(0, this.opacity);
                ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                ctx.font = `${this.size}px Arial`;
                ctx.fillText(this.char, -this.size/2, this.size/2); ctx.restore();
            }
        }

        class ShootingStar {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width * 1.5; this.y = 0;
                this.len = Math.random() * 80 + 30; this.speed = Math.random() * 10 + 10;
                this.active = false;
            }
            update() {
                if (this.active) {
                    this.x -= this.speed; this.y += this.speed;
                    if (this.x < 0 || this.y > canvas.height) this.active = false;
                } else if (Math.random() < 0.005) { this.reset(); this.active = true; }
            }
            draw() {
                if (!this.active) return;
                ctx.beginPath(); ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.len, this.y - this.len);
                ctx.strokeStyle = "rgba(255, 255, 255, 0.4)"; ctx.lineWidth = 2; ctx.stroke();
            }
        }
        for(let i=0; i<3; i++) shootingStars.push(new ShootingStar());

        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Twinkling Stars
            stars.forEach(s => {
                s.alpha += s.speed;
                if (s.alpha > 1 || s.alpha < 0) s.speed *= -1;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, s.alpha)})`; ctx.fill();
            });

            // Draw Shooting Stars
            shootingStars.forEach(s => { s.update(); s.draw(); });

            // Draw Particles
            for (let i = interactionParticles.length - 1; i >= 0; i--) {
                let p = interactionParticles[i];
                p.update(); p.draw();
                if (p.opacity <= 0) interactionParticles.splice(i, 1);
            }
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

        // --- 3. 3D UNWRAP LOGIC ---
        function unwrapChocolate(element, title, text) {
            // Avoid triggering if already flipped
            if(element.classList.contains('flipped')) return;

            // Trigger 3D Flip
            element.classList.add('flipped');

            const rect = element.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            // Wait for flip to reach halfway before bursting particles
            setTimeout(() => {
                const elements = ['✨', '💖', '🍫', '💫'];
                for(let i = 0; i < 20; i++) {
                    let char = elements[Math.floor(Math.random() * elements.length)];
                    interactionParticles.push(new Particle(startX, startY, char));
                }
            }, 300);

            // Show Message
            setTimeout(() => {
                document.getElementById('msgTitle').innerText = title;
                document.getElementById('msgText').innerText = text;
                document.getElementById('msgOverlay').classList.add('active');
            }, 800);
        }

        function closePopup() {
            document.getElementById('msgOverlay').classList.remove('active');
        }
    </script>
</body>
</html>
