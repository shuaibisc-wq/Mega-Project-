<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Segment 10 - High-End Dynamic Chocolate Box</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #060100;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            perspective: 1000px; /* Added for 3D effects */
        }

        /* Continuous High-Density Fusion Background Engine */
        #hyper-dynamic-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 400px; 
            padding: 20px;
            text-align: center;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #ffebd1;
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: 1px;
            text-shadow: 0 4px 20px rgba(255, 215, 0, 0.4), 0 0 10px rgba(0,0,0,0.8);
            animation: floatGlow 3s infinite alternate ease-in-out;
        }

        @keyframes floatGlow {
            0% { text-shadow: 0 4px 20px rgba(255, 235, 150, 0.3), 0 0 10px rgba(0,0,0,0.8); transform: translateY(0); }
            100% { text-shadow: 0 4px 30px rgba(255, 235, 150, 0.7), 0 0 10px rgba(0,0,0,0.8); transform: translateY(-3px); }
        }

        p.subtitle {
            color: #e5bba1;
            font-size: 14px;
            margin-bottom: 35px;
            font-weight: 300;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.9);
        }

        /* Glassmorphic Luxury Box Container Matrix */
        .chocolate-box {
            background: rgba(30, 12, 6, 0.25);
            border-radius: 30px;
            padding: 25px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 235, 200, 0.1);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 
                        inset 0 2px 15px rgba(255, 235, 200, 0.05);
            display: grid;
            grid-template-columns: repeat(2, 135px);
            gap: 22px;
            justify-content: center;
            margin-bottom: 45px;
            transform-style: preserve-3d;
        }

        /* 3D Chocolate Cards */
        .chocolate-card {
            background: linear-gradient(145deg, rgba(50, 20, 10, 0.8), rgba(20, 5, 2, 0.9));
            height: 135px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.15s ease-out, box-shadow 0.4s ease, background 0.4s;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 5px 10px 25px rgba(0,0,0,0.7);
        }

        .choco-icon {
            font-size: 46px;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.8));
            transform: translateZ(30px); /* 3D pop out effect */
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .choco-name {
            color: #f7e7d2;
            font-size: 11px;
            margin-top: 12px;
            font-weight: 500;
            letter-spacing: 0.6px;
            text-transform: uppercase;
            transform: translateZ(20px); /* 3D pop out effect */
        }

        /* Unwrapped Cinematic Glow State */
        .chocolate-card.unwrapped {
            background: linear-gradient(145deg, #8a3a16, #3d1405);
            border-color: #ffdca8;
            box-shadow: 0 0 35px rgba(255, 180, 100, 0.4), inset 0 0 20px rgba(255,255,255,0.1);
        }

        .chocolate-card.unwrapped .choco-icon {
            transform: translateZ(40px) scale(1.3) rotate(15deg);
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6));
        }

        /* Premium Custom Glass Message PopUp Frame Setup */
        .message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(15, 5, 2, 0.8) 0%, rgba(0, 0, 0, 0.95) 100%);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .message-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .message-card {
            background: linear-gradient(135deg, rgba(45, 15, 8, 0.9), rgba(15, 5, 2, 0.95));
            padding: 35px 30px;
            border-radius: 28px;
            width: 88%;
            max-width: 330px;
            text-align: center;
            border: 1px solid rgba(255, 215, 150, 0.3);
            box-shadow: 0 40px 80px rgba(0,0,0,0.95), 0 0 40px rgba(150, 60, 20, 0.4);
            transform: translateY(60px) scale(0.8) rotateX(-10deg);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
        }

        .message-overlay.active .message-card {
            transform: translateY(0) scale(1) rotateX(0deg);
            opacity: 1;
        }

        .message-card h3 {
            font-family: 'Playfair Display', serif;
            color: #ffebd1;
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(255,215,0,0.3);
        }

        .message-card p {
            color: #e5d1c5;
            font-size: 14.5px;
            line-height: 1.7;
            margin-bottom: 28px;
            font-weight: 300;
        }

        .close-btn {
            background: linear-gradient(45deg, #d49a5b, #fce2b8, #d49a5b);
            background-size: 200% auto;
            color: #2b1104;
            border: none;
            padding: 12px 35px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 0.8px;
            box-shadow: 0 8px 20px rgba(212, 154, 91, 0.4);
            transition: all 0.3s ease;
            animation: shine 3s infinite linear;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .close-btn:active {
            transform: scale(0.92);
        }

        /* Romantic and Mysterious Dynamic Link Trigger */
        .nav-btn {
            display: inline-block;
            background: linear-gradient(45deg, #7a1226, #3a0410);
            color: #ffe6d9;
            text-decoration: none;
            padding: 16px 36px;
            border-radius: 35px;
            font-weight: 500;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 180, 150, 0.2);
            box-shadow: 0 10px 35px rgba(122, 18, 38, 0.6),
                        inset 0 2px 5px rgba(255,255,255,0.15);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .nav-btn:hover::after { opacity: 1; }
        .nav-btn:active { transform: scale(0.94); box-shadow: 0 5px 15px rgba(122, 18, 38, 0.4); }
        
        .pulse-animation {
            animation: navPulse 2.5s infinite;
        }

        @keyframes navPulse {
            0% { box-shadow: 0 0 0 0 rgba(122, 18, 38, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(122, 18, 38, 0); }
            100% { box-shadow: 0 0 0 0 rgba(122, 18, 38, 0); }
        }
    </style>
</head>
<body>

    <canvas id="hyper-dynamic-canvas"></canvas>

    <audio id="bg-music" loop>
        <source src="music7.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>Chocolate Box for Prova 🍫</h1>
        <p class="subtitle">Tap the boxes to unwrap premium treats!</p>

        <div class="chocolate-box">
            <div class="chocolate-card" onmousemove="tiltCard(event, this)" onmouseleave="resetTilt(this)" onclick="unwrapChocolate(this, 'Dark Chocolate 🖤', 'You are deeper and more beautiful than the finest Dark Chocolate, Prova!')">
                <div class="choco-icon">🍫</div>
                <div class="choco-name">Dark Choco</div>
            </div>
            <div class="chocolate-card" onmousemove="tiltCard(event, this)" onmouseleave="resetTilt(this)" onclick="unwrapChocolate(this, 'Caramel Truffle 🍯', 'You are sweeter than this golden Caramel Truffle, Prova! 💖')">
                <div class="choco-icon">🍬</div>
                <div class="choco-name">Caramel Truffle</div>
            </div>
            <div class="chocolate-card" onmousemove="tiltCard(event, this)" onmouseleave="resetTilt(this)" onclick="unwrapChocolate(this, 'Strawberry Silk 🍓', 'Every moment with you feels as premium and smooth as Strawberry Silk!')">
                <div class="choco-icon">💝</div>
                <div class="choco-name">Strawberry Silk</div>
            </div>
            <div class="chocolate-card" onmousemove="tiltCard(event, this)" onmouseleave="resetTilt(this)" onclick="unwrapChocolate(this, 'White Almond 🤍', 'Pure, rare, and unique—just like the best White Almond block!')">
                <div class="choco-icon">🍪</div>
                <div class="choco-name">White Almond</div>
            </div>
        </div>

        <a href="segment11.html" class="nav-btn pulse-animation" onclick="saveAudioState()">A Mysterious Symphony Awaits... 🎵</a>
    </div>

    <div class="message-overlay" id="msgOverlay">
        <div class="message-card">
            <h3 id="msgTitle">Title</h3>
            <p id="msgText">Message</p>
            <button class="close-btn" onclick="closePopup()">Aww! 💕</button>
        </div>
    </div>

    <script>
        // --- 1. CONTINUOUS TRACK INTEGRATION ENGINE ---
        const audio = document.getElementById('bg-music');

        window.addEventListener('DOMContentLoaded', () => {
            const savedTime = localStorage.getItem('music_time');
            const isPaused = localStorage.getItem('music_paused');

            if (savedTime !== null) audio.currentTime = parseFloat(savedTime);

            if (isPaused !== 'true') {
                const playAudio = () => { audio.play().catch(e => console.log(e)); };
                playAudio();
                window.addEventListener('click', playAudio, { once: true });
                window.addEventListener('touchstart', playAudio, { once: true });
            }
        });

        setInterval(() => {
            if (!audio.paused) {
                localStorage.setItem('music_time', audio.currentTime);
                localStorage.setItem('music_paused', 'false');
            }
        }, 300);

        function saveAudioState() {
            localStorage.setItem('music_time', audio.currentTime);
            localStorage.setItem('music_paused', audio.paused ? 'true' : 'false');
        }

        // --- 2. 3D CARD TILT ENGINE ---
        function tiltCard(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left; 
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = ((y - centerY) / centerY) * -15; // Max 15 deg tilt
            const rotateY = ((x - centerX) / centerX) * 15;

            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
        }

        function resetTilt(card) {
            if(!card.classList.contains('unwrapped')) {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            }
        }

        // --- 3. MULTI-LAYER STAR & AURORA CANVAS ENGINE ---
        const canvas = document.getElementById('hyper-dynamic-canvas');
        const ctx = canvas.getContext('2d');

        let interactionParticles = [];
        let ambientStars = [];
        const emojis = ['🍫', '✨', '💖', '💝', '🌟', '✨'];
        let waveTime = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function initAmbientStars() {
            ambientStars = [];
            for(let i=0; i<60; i++) {
                ambientStars.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    radius: Math.random() * 2 + 0.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.015 + 0.005,
                    driftX: Math.random() * 0.4 - 0.2,
                    driftY: Math.random() * 0.5 + 0.1,
                    isFirefly: Math.random() > 0.8
                });
            }
        }
        initAmbientStars();

        class ExplosionParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
                this.size = Math.random() * 20 + 15;
                this.speedX = (Math.random() - 0.5) * 12;
                this.speedY = (Math.random() - 1) * 12 - 4;
                this.gravity = 0.5;
                this.opacity = 1;
                this.spin = (Math.random() - 0.5) * 0.2;
                this.angle = Math.random() * Math.PI * 2;
                this.scale = 1;
            }

            update() {
                this.speedY += this.gravity;
                this.x += this.speedX;
                this.y += this.speedY;
                this.angle += this.spin;
                this.opacity -= 0.015;
                this.scale *= 0.98; // Shrink as they fall
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.opacity);
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.scale(this.scale, this.scale);
                ctx.font = `${this.size}px Arial`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = "rgba(255, 215, 0, 0.5)";
                ctx.fillText(this.emoji, -this.size/2, this.size/2);
                ctx.restore();
            }
        }

        function renderLivingBackground() {
            waveTime += 0.002;
            ctx.fillStyle = '#060100';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Layer 1: Luxury Deep Cocoa Aurora
            ctx.fillStyle = 'rgba(40, 15, 8, 0.5)';
            ctx.beginPath();
            ctx.moveTo(0, 0);
            for (let x = 0; x <= canvas.width; x += 20) {
                let y = canvas.height * 0.3 + Math.sin(x * 0.002 + waveTime) * 80 + Math.cos(x * 0.001 - waveTime) * 40;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(canvas.width, canvas.height); ctx.lineTo(0, canvas.height); ctx.fill();

            // Layer 2: Deep Velvet Swell
            ctx.fillStyle = 'rgba(60, 10, 15, 0.25)';
            ctx.beginPath();
            ctx.moveTo(0, 0);
            for (let x = 0; x <= canvas.width; x += 20) {
                let y = canvas.height * 0.6 + Math.cos(x * 0.003 - waveTime * 1.2) * 60 + Math.sin(x * 0.0015 + waveTime * 1.5) * 50;
                ctx.lineTo(x, y);
            }
            ctx.lineTo(canvas.width, canvas.height); ctx.lineTo(0, canvas.height); ctx.fill();

            // Layer 3: Glowing Starry Night / Fireflies
            for (let i = 0; i < ambientStars.length; i++) {
                let s = ambientStars[i];
                s.alpha += s.speed;
                s.y -= s.driftY; 
                s.x += s.driftX;

                if (s.alpha > 1 || s.alpha < 0) s.speed = -s.speed;
                if (s.y < -10) { s.y = canvas.height + 10; s.x = Math.random() * canvas.width; }
                if (s.x < -10 || s.x > canvas.width + 10) s.driftX = -s.driftX;

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                
                if (s.isFirefly) {
                    ctx.fillStyle = `rgba(255, 215, 100, ${Math.max(0, s.alpha)})`;
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = "rgba(255, 200, 50, 0.8)";
                } else {
                    ctx.fillStyle = `rgba(255, 245, 230, ${Math.max(0, s.alpha * 0.6)})`;
                    ctx.shadowBlur = 0;
                }
                ctx.fill();
                ctx.shadowBlur = 0; // Reset
            }
        }

        function mainLoop() {
            renderLivingBackground();
            for (let i = interactionParticles.length - 1; i >= 0; i--) {
                interactionParticles[i].update();
                interactionParticles[i].draw();
                if (interactionParticles[i].opacity <= 0) interactionParticles.splice(i, 1);
            }
            requestAnimationFrame(mainLoop);
        }
        mainLoop();

        // --- 4. CORE INTERACTIVE UNWRAP LOGIC ---
        function unwrapChocolate(element, title, text) {
            element.classList.add('unwrapped');
            element.style.transform = `perspective(1000px) scale3d(0.95, 0.95, 0.95)`;

            const rect = element.getBoundingClientRect();
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            for(let i = 0; i < 25; i++) {
                interactionParticles.push(new ExplosionParticle(startX, startY));
            }

            setTimeout(() => {
                document.getElementById('msgTitle').innerText = title;
                document.getElementById('msgText').innerText = text;
                document.getElementById('msgOverlay').classList.add('active');
            }, 400);
        }

        function closePopup() {
            document.getElementById('msgOverlay').classList.remove('active');
            // Reset unwrapped cards slightly
            document.querySelectorAll('.unwrapped').forEach(card => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            });
        }
    </script>
</body>
</html>
